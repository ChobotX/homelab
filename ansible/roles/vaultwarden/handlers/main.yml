---
# `up --wait` + the service's own healthcheck (container-level) + Traefik's
# active loadbalancer healthcheck give a sub-second user-visible gap on a
# vaultwarden swap. SQLite WAL is checkpointed inside stop_grace_period.

- name: Swap vaultwarden service
  ansible.builtin.command:
    chdir: /opt/vaultwarden
    # --force-recreate so bind-mounted env/config changes actually trigger
    # a restart (compose sees no service-spec diff otherwise).
    cmd: docker compose up -d --wait --no-deps --force-recreate vaultwarden
  changed_when: true
