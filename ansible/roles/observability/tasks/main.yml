---
- name: Ensure /opt/observability layout
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
    - /opt/observability
    - /opt/observability/data
    - /opt/observability/data/alertmanager
    - /opt/observability/data/alloy
    - /opt/observability/grafana
    - /opt/observability/grafana/provisioning
    - /opt/observability/grafana/provisioning/datasources
    - /opt/observability/grafana/provisioning/dashboards
    - /opt/observability/grafana/dashboards

- name: Ensure Grafana data dir (owned by Grafana UID)
  ansible.builtin.file:
    path: /opt/observability/data/grafana
    state: directory
    owner: "{{ observability_grafana_uid }}"
    group: "{{ observability_grafana_gid }}"
    mode: "0755"

- name: Ensure Prometheus data dir (owned by nobody/nogroup)
  ansible.builtin.file:
    path: /opt/observability/data/prometheus
    state: directory
    owner: "{{ observability_prometheus_uid }}"
    group: "{{ observability_prometheus_gid }}"
    mode: "0755"

- name: Ensure Loki data dir (owned by loki UID)
  ansible.builtin.file:
    path: /opt/observability/data/loki
    state: directory
    owner: "{{ observability_loki_uid }}"
    group: "{{ observability_loki_gid }}"
    mode: "0755"

- name: Ensure Tempo data dir (owned by tempo UID)
  ansible.builtin.file:
    path: /opt/observability/data/tempo
    state: directory
    owner: "{{ observability_tempo_uid }}"
    group: "{{ observability_tempo_gid }}"
    mode: "0755"

- name: Create shared observability network
  community.docker.docker_network:
    name: "{{ observability_network }}"
    state: present

# Observability runs before traefik (intentional — traefik needs the
# observability network to exist when it starts). Its compose also attaches
# Grafana to the `proxy` network so Traefik can route to it. Create that
# network here too; the traefik role is idempotent and will happily adopt it.
- name: Create shared proxy network (will be adopted by Traefik role)
  community.docker.docker_network:
    name: proxy
    state: present

- name: Template .env
  # Shared across all services — any variable in here may have changed, so
  # every service handler is notified. Handlers dedup per play so this is
  # still one swap per service, not N.
  ansible.builtin.template:
    src: env.j2
    dest: /opt/observability/.env
    owner: root
    group: root
    mode: "0600"
  no_log: true
  notify:
    - Swap grafana service
    - Swap prometheus service
    - Swap loki service
    - Swap tempo service
    - Swap alloy service
    - Rollout alertmanager

- name: Template Prometheus config
  ansible.builtin.template:
    src: prometheus.yml.j2
    dest: /opt/observability/prometheus.yml
    owner: root
    group: root
    mode: "0644"
  no_log: true
  notify: Swap prometheus service

- name: Deploy Prometheus alert rules
  ansible.builtin.copy:
    src: alert-rules.yml
    dest: /opt/observability/alert-rules.yml
    owner: root
    group: root
    mode: "0644"
  notify: Swap prometheus service

# Per-container state metrics (running/health/restart count) as a systemd-timed
# textfile producer. Alloy's node_exporter textfile collector already watches
# /var/lib/node_exporter/textfile (see alloy-config.alloy.j2), so no scrape
# job or new service is needed — metrics auto-flow with `job="node"`.

- name: Ensure node_exporter textfile collector directory
  ansible.builtin.file:
    path: /var/lib/node_exporter/textfile
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Deploy docker-state exporter script
  ansible.builtin.copy:
    src: docker-state-exporter.sh
    dest: /usr/local/sbin/docker-state-exporter.sh
    owner: root
    group: root
    mode: "0750"

- name: Deploy docker-state exporter systemd service unit
  ansible.builtin.copy:
    src: docker-state-exporter.service
    dest: /etc/systemd/system/docker-state-exporter.service
    owner: root
    group: root
    mode: "0644"
  notify: Reload systemd

- name: Deploy docker-state exporter systemd timer unit
  ansible.builtin.copy:
    src: docker-state-exporter.timer
    dest: /etc/systemd/system/docker-state-exporter.timer
    owner: root
    group: root
    mode: "0644"
  notify: Reload systemd

- name: Enable and start docker-state exporter timer
  ansible.builtin.systemd:
    name: docker-state-exporter.timer
    state: started
    enabled: true
    daemon_reload: true

- name: Deploy Loki config
  ansible.builtin.copy:
    src: loki-config.yml
    dest: /opt/observability/loki-config.yml
    owner: root
    group: root
    mode: "0644"
  notify: Swap loki service

- name: Deploy Tempo config
  ansible.builtin.copy:
    src: tempo-config.yml
    dest: /opt/observability/tempo-config.yml
    owner: root
    group: root
    mode: "0644"
  notify: Swap tempo service

- name: Template Alertmanager config
  ansible.builtin.template:
    src: alertmanager.yml.j2
    dest: /opt/observability/alertmanager.yml
    owner: root
    group: root
    mode: "0644"
  no_log: true
  notify: Rollout alertmanager

- name: Template Alloy config
  ansible.builtin.template:
    src: alloy-config.alloy.j2
    dest: /opt/observability/alloy-config.alloy
    owner: root
    group: root
    mode: "0644"
  notify: Swap alloy service

- name: Template Grafana datasources provisioning
  ansible.builtin.template:
    src: grafana-datasources.yml.j2
    dest: /opt/observability/grafana/provisioning/datasources/datasources.yml
    owner: root
    group: "{{ observability_grafana_gid }}"
    mode: "0640"
  notify: Swap grafana service

- name: Template Grafana dashboards provisioning
  # Provider config itself — path, folder, intervals — requires a grafana
  # restart to take effect (file-provider scan is read once on boot).
  ansible.builtin.template:
    src: grafana-dashboards.yml.j2
    dest: /opt/observability/grafana/provisioning/dashboards/dashboards.yml
    owner: root
    group: "{{ observability_grafana_gid }}"
    mode: "0640"
  notify: Swap grafana service

- name: Sync dashboard JSONs
  # No notify — Grafana's file provider auto-reloads JSON changes every
  # updateIntervalSeconds (30s). A container swap would be pure overhead.
  ansible.builtin.copy:
    src: "{{ item }}"
    dest: /opt/observability/grafana/dashboards/
    owner: root
    group: "{{ observability_grafana_gid }}"
    mode: "0640"
  with_fileglob:
    - "dashboards/*.json"

- name: Deploy docker-compose.yml
  # Compose-file change can affect any service (network, volume, labels,
  # image bumps landed via defaults) — notify every handler.
  ansible.builtin.copy:
    src: docker-compose.yml
    dest: /opt/observability/docker-compose.yml
    owner: root
    group: root
    mode: "0644"
  notify:
    - Swap grafana service
    - Swap prometheus service
    - Swap loki service
    - Swap tempo service
    - Swap alloy service
    - Rollout alertmanager

- name: Bring up observability stack
  # First-deploy safety net — creates any service not yet running. Image
  # pulls happen here, but `recreate: never` stops this task from tearing
  # down running containers when the compose file changes. That recreate
  # path belongs to the per-service handlers above, so the --wait gate is
  # what actually performs every swap.
  community.docker.docker_compose_v2:
    project_src: /opt/observability
    state: present
    pull: policy
    recreate: never
