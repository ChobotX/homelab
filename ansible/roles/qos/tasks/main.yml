---
- name: Ensure iproute2 is installed
  # tc + ip ship in iproute2. Already present on Ubuntu by default but we
  # declare it for truth — role must be self-contained.
  ansible.builtin.apt:
    name: iproute2
    state: present
    update_cache: false

- name: Ensure ifb kernel module is loaded at boot
  # Ingress shaping requires an Intermediate Functional Block device; the
  # module must load before the systemd unit fires. modules-load.d reads
  # at early boot, so qos.service always finds /sys/class/net/ifb0 ready.
  ansible.builtin.copy:
    dest: /etc/modules-load.d/ifb.conf
    content: "ifb\n"
    owner: root
    group: root
    mode: "0644"
  notify: Reload ifb module

- name: Template tc apply script
  # Single script is the source of truth — systemd just runs it. Keeping
  # the tc incantations out of the unit makes `systemctl cat` readable
  # and lets us iterate the ruleset without touching unit metadata.
  ansible.builtin.template:
    src: tc-apply.sh.j2
    dest: /usr/local/sbin/tc-apply.sh
    owner: root
    group: root
    mode: "0755"
  notify: Reapply QoS

- name: Template tc flush script
  # Separate flush script so ExecStop has something stable to call. Also
  # usable manually to nuke shaping for debugging without stopping the unit.
  ansible.builtin.template:
    src: tc-flush.sh.j2
    dest: /usr/local/sbin/tc-flush.sh
    owner: root
    group: root
    mode: "0755"
  notify: Reapply QoS

- name: Template qos.service unit
  ansible.builtin.template:
    src: qos.service.j2
    dest: /etc/systemd/system/qos.service
    owner: root
    group: root
    mode: "0644"
  notify:
    - Reload systemd
    - Reapply QoS

- name: Flush handlers before enable/start so restart uses fresh unit
  ansible.builtin.meta: flush_handlers

- name: Enable and start qos.service
  # enabled:true even when qos_enabled=false is wrong — toggle via state
  # instead. `enabled` follows the same flag so a disabled run disables
  # the unit at boot too.
  ansible.builtin.systemd:
    name: qos.service
    enabled: "{{ qos_enabled | bool }}"
    state: "{{ 'started' if qos_enabled | bool else 'stopped' }}"
