---
# Blackbox exporter module definitions. Targets live in prometheus.yml
# (per-job static_configs), not here.
modules:
  http_2xx:
    prober: http
    timeout: 5s
    http:
      valid_status_codes: []
      valid_http_versions: ["HTTP/1.1", "HTTP/2.0"]
      follow_redirects: true
      preferred_ip_protocol: ip4
      ip_protocol_fallback: false

  http_2xx_insecure:
    prober: http
    timeout: 5s
    http:
      valid_status_codes: []
      follow_redirects: true
      preferred_ip_protocol: ip4
      tls_config:
        insecure_skip_verify: true

  tcp_connect:
    prober: tcp
    timeout: 5s

  icmp:
    prober: icmp
    timeout: 3s
    icmp:
      preferred_ip_protocol: ip4
