---
- name: Ensure /opt/ollama layout
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
    - /opt/ollama
    - "{{ ollama_models_root }}"

- name: Template .env
  ansible.builtin.template:
    src: env.j2
    dest: /opt/ollama/.env
    owner: root
    group: root
    mode: "0600"
  notify: Swap ollama service

- name: Template docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: /opt/ollama/docker-compose.yml
    owner: root
    group: root
    mode: "0644"
  notify: Swap ollama service

# Flush handlers BEFORE the safety-net up-task so any template change recreates
# the container via `--force-recreate`. With the reverse order (vaultwarden
# pattern), a stale/broken container from a previous failed deploy would be
# "Start"-ed with its old config-hash by compose-up, hit the same failure
# again, and the handler never fires. Ollama's runtime-coupled config
# (GPU flags, models) makes this more likely than for plain HTTP services.
- name: Apply any pending service swap before bring-up
  ansible.builtin.meta: flush_handlers

- name: Bring up Ollama stack
  # Safety net: brings the container up if no template changed (handler
  # didn't fire) but the container was missing. Idempotent no-op when the
  # handler just did the --force-recreate.
  community.docker.docker_compose_v2:
    project_src: /opt/ollama
    state: present
    pull: policy
    recreate: never

- name: List models already present on this host
  # Parse `ollama list` output so the pull step is a no-op when the model is
  # already cached on disk — avoids re-downloading multi-GiB weights on every
  # converge. First column = model:tag.
  ansible.builtin.command: docker exec ollama ollama list
  register: ollama_list
  changed_when: false
  failed_when: false

- name: Pull Ollama models
  # ollama pull is itself idempotent (resumable + skips existing layers), but
  # gating on the list above means we don't even shell into the container
  # unless a pull is actually needed.
  ansible.builtin.command: "docker exec ollama ollama pull {{ item }}"
  loop: "{{ ollama_models }}"
  register: ollama_pull
  changed_when: "'pulling' in ollama_pull.stdout or 'writing' in ollama_pull.stdout"
  when: item not in (ollama_list.stdout | default(''))

- name: Compute on-disk models not in declared list
  # `ollama list` header is line 0, models start at line 1. First
  # whitespace-delimited column is `name:tag`. Diff against `ollama_models`
  # gives the removable set.
  ansible.builtin.set_fact:
    ollama_undeclared: "{{ (ollama_list.stdout_lines[1:] | default([]))
                          | map('split') | map('first') | list
                          | difference(ollama_models) }}"
  when: ollama_prune_undeclared | bool

- name: Remove Ollama models absent from declared list
  # Opt-in destructive — gated on `ollama_prune_undeclared`. Keep defaulted
  # to false so hand-pulled experiments on a host aren't silently purged on
  # the next converge.
  ansible.builtin.command: "docker exec ollama ollama rm {{ item }}"
  loop: "{{ ollama_undeclared | default([]) }}"
  changed_when: true
  when: ollama_prune_undeclared | bool
