---
name: ci

on:
  pull_request:
  push:
    branches: [main]

# Hard-coded permission floor — fork PRs never see secrets.
permissions:
  contents: read

jobs:
  lint:
    name: lint (yamllint + ansible-lint + gitleaks + shellcheck)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Forbid mixed WG subnets (docs/code drift guard)
        run: |
          conflicts=$(grep -rEho '10\.[0-9]+\.0\.0/24' \
            --exclude-dir=.git --exclude-dir=node_modules . | sort -u | wc -l)
          if [ "$conflicts" -gt 1 ]; then
            echo "::error::multiple WG subnets found in repo:"
            grep -rEno '10\.[0-9]+\.0\.0/24' --exclude-dir=.git . | sort -u
            exit 1
          fi

      - name: yamllint
        run: |
          pip install --user yamllint==1.38.0
          ~/.local/bin/yamllint .

      - name: Install ansible collections (so ansible-lint can resolve modules)
        run: |
          pip install --user ansible-core==2.20.4
          ~/.local/bin/ansible-galaxy collection install -r ansible/requirements.yml

      - uses: ansible/ansible-lint@v26.4.0
        with:
          args: "--profile=basic"
          working_directory: ansible

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: "./"
          severity: warning

  docker-test:
    name: docker test harness (apply safe roles in Ubuntu 24 container)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Run tests/docker/test.sh apply
        run: ./tests/docker/test.sh apply
