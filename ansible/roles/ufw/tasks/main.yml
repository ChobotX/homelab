---
- name: Install ufw
  ansible.builtin.apt:
    name: ufw
    state: present

# Apply in a block so default-deny never lands before the SSH allow rule.
# Order inside: allow rules first, THEN default-deny, THEN enable.
- name: Apply firewall policy (lockout-safe ordering)
  block:
    - name: Allow from WG subnet
      community.general.ufw:
        rule: allow
        port: "{{ item.port }}"
        proto: tcp
        src: "{{ wireguard_subnet }}"
        comment: "{{ item.name }}-from-wg"
      loop:
        - { name: ssh, port: "22" }
        - { name: http, port: "80" }
        - { name: https, port: "443" }

    - name: Default outgoing allow
      community.general.ufw:
        direction: outgoing
        policy: allow

    - name: Default incoming deny
      community.general.ufw:
        direction: incoming
        policy: deny

    - name: Default routed deny
      community.general.ufw:
        direction: routed
        policy: deny

    - name: Enable + persist ufw
      community.general.ufw:
        state: enabled
        logging: "{{ ufw_logging }}"

- name: Assert SSH from WG is actually in the ruleset
  # Belt-and-suspenders: if the allow rule was removed by mistake, refuse to
  # leave the box in a deny-all state. Skipped inside containers because
  # netfilter is typically unavailable / faked there.
  when: ansible_virtualization_type not in ['docker', 'lxc', 'container']
  block:
    - name: Dump current ufw rules
      ansible.builtin.command: ufw status numbered
      register: ufw_status
      changed_when: false

    - name: Fail if SSH allow-from-WG rule is missing
      ansible.builtin.assert:
        that:
          - ufw_status.stdout is search('22/tcp.*ALLOW IN.*' + (wireguard_subnet | regex_escape))
        fail_msg: "UFW is active but has no ALLOW rule for SSH from {{ wireguard_subnet }} — would lock you out."
