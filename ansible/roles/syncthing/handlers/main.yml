---
# `up --wait` + container healthcheck + Traefik active healthcheck keep swap
# user-visible gap sub-second. Syncthing itself also writes `.stfolder` markers
# asynchronously — stop_grace_period: 30s gives it time to flush.

- name: Swap syncthing service
  ansible.builtin.command:
    chdir: /opt/syncthing
    # --force-recreate so bind-mounted env/compose changes actually trigger a
    # restart (compose sees no service-spec diff otherwise).
    cmd: docker compose up -d --wait --no-deps --force-recreate syncthing
  changed_when: true
