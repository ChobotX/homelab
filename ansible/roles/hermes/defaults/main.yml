---
# Hermes Agent (Nous Research) — autonomous self-hosted agent, sandboxed.
#
# Fully autonomous (approvals.mode: off — no command prompts). That is SAFE
# only because the container is the jail: no docker.sock, no host bind-mounts
# beyond /opt/hermes/data, and the agent's network reach is scoped to the
# observability + hermes docker nets (+ Home Assistant over WG). It physically
# cannot stop/delete other services or touch the host. See tasks + compose.
#
# Pinned by tag + digest; pull is by digest so the tag is cosmetic.
hermes_image: "nousresearch/hermes-agent:latest@sha256:39ce97f831e423408d85ccf7a4a00572726ab0704a1b0b3e6382336bba8d49e0"

hermes_host: "hermes.{{ homelab_domain }}"

# LLM: Qwen3-Coder-Next 80B served by ailab (llama-server behind LiteLLM on
# the WG mesh, reached through host routing like Home Assistant). LiteLLM
# enforces the per-service API key (hermes_llm_api_key secret) and tracks
# usage per key. Previous Mistral path (mistral_proxy shim) left in place but
# no longer referenced here.
hermes_model: "qwen3-coder"
hermes_llm_base_url: "http://10.8.0.9:4000/v1"

# Autonomous-run circuit breaker — cap iterations per conversation so a
# runaway tool loop can't hog the single ailab inference slot unbounded.
hermes_max_turns: 90

# API retry headroom. Kept at 5 (was the default 3) from the Mistral rate-limit
# era; harmless against ailab and still useful when the single llama-server
# slot is busy with another caller.
hermes_api_max_retries: 5

# Service endpoints the agent reaches. Loki/Prometheus by DNS over the
# observability net; Trilium by DNS over the hermes net; Home Assistant by its
# WG IP (reached through host routing — HA is not a docker container here).
hermes_loki_url: "http://loki:3100"
hermes_prometheus_url: "http://prometheus:9090"
hermes_trilium_url: "http://trilium:8080"
# HA endpoint comes from /etc/homelab/config.yml (homeassistant_host, host-truth
# not git — already includes :port), reached over WG through host routing.
hermes_homeassistant_url: "http://{{ homeassistant_host }}"

hermes_dashboard_user: "admin"

# Agent shell tools. The image ships rg/curl/git/node/python3 but not jq.
# jq is dropped into the bind-mounted data/bin (persists recreate); that dir is
# prepended to the container PATH (data-env.j2) so it — and any tools the agent
# installs there itself — resolve ahead of the image binaries. Host is amd64.
hermes_jq_version: "1.7.1"
hermes_jq_sha256: "5942c9b0934e510ee61eb3e30273f1b3fe2590df93933a93d7c58b81d19c8ff5"

# Web search backend = ddgs (DuckDuckGo, no API key, free). Hermes imports the
# `ddgs` PyPI package in-process; it would otherwise lazy-install into the
# container's site-packages and lose it on every recreate. Instead we vendor it
# pip-installed into the bind-mounted data/pylib (survives recreate) and put
# that on PYTHONPATH (data-env.j2) — same "pin it, persist it" idea as jq above.
# primp (a ddgs dep) is a compiled wheel, so the install runs INSIDE the
# container (correct arch/abi), not on the host. Bump = delete data/pylib to
# force reinstall (mirrors the seed-once config pattern).
hermes_ddgs_version: "9.14.4"

# Honcho memory plugin — the `honcho-ai` SDK is vendored into data/pylib the
# same way as ddgs (imported in-process, must survive recreate). The honcho
# server itself is the honcho role's stack; hermes reaches it at
# http://honcho:8000 over the hermes net (local URL = no API key needed).
hermes_honcho_ai_version: "2.2.0"
hermes_honcho_user_peer: "ondrej"

# Bind-mounted to /opt/data (Hermes' data + config dir). The image's app
# processes run as user `hermes` (uid 10000) — seeds must be owned by it or
# the agent can't read them (bit us with honcho.json).
hermes_data_dir: /opt/hermes/data
hermes_data_uid: "10000"

# Discord allowlist — set per-host in /etc/homelab/config.yml (host-truth, not
# git), slurped as play vars on every converge. Empty here = fail closed: the
# gateway denies all Discord users until config.yml provides the IDs.
# The bot token itself is /etc/homelab/secrets/hermes_discord_token.
hermes_discord_allowed_users: ""
hermes_discord_allowed_channels: ""
