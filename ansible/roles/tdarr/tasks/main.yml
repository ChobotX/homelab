---
# Tdarr — automated transcode farm. Mirrors the Jellyfin role pattern:
# /opt/<service> hosts the compose project; data subdirs are bind-mounted from
# btrfs (storage role); container drops all caps + no-new-privileges; swap
# happens via per-service handler with `up --wait --force-recreate`.

- name: Assert NVIDIA GPU is present
  # Tdarr in this homelab is GPU-only — Pascal P2000 NVENC. CPU-only mode
  # would burn host CPU on a server already running Jellyfin/observability/
  # arr stack. Refuse to roll out without the GPU rather than silently
  # degrading.
  ansible.builtin.assert:
    that: nvidia_gpu_enabled | default(false) | bool
    fail_msg: |
      Tdarr role requires nvidia_gpu_enabled (set from /usr/bin/nvidia-smi
      presence in site.yml pre_tasks). No GPU means no NVENC; refusing to
      deploy a CPU-only transcode farm on this host.

- name: Ensure /opt/tdarr layout
  # `server`, `configs`, `logs` are bind-mounted from /mnt/elements via the
  # storage role — these are the SSD-side mountpoints (empty post-bind).
  # Owner uid 1000 so the linuxserver-style PUID drop-in user can write.
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ tdarr_puid }}"
    group: "{{ tdarr_pgid }}"
    mode: "0755"
  loop:
    - /opt/tdarr
    - /opt/tdarr/server
    - /opt/tdarr/configs
    - /opt/tdarr/logs
    - /opt/tdarr/cache
    - /opt/tdarr/server/Tdarr/Plugins/Local

- name: Deploy custom local plugins
  # Local plugins shipped via IaC, mounted into Tdarr's plugin dir so the
  # node loads them on startup. Audited in-tree, no community-plugin drift.
  #
  #   skip_hardlinked        — keystone safety, skip files with nlink > 1
  #                            (still seeded by qBit, replacing them would
  #                            break the hardlink and double disk usage).
  #   hevc_nvenc_streaming   — HEVC NVENC encode with explicit maxrate cap
  #                            and audio re-encode to E-AC3 640k, sized so
  #                            output streams over a 20 Mbps WAN with audio
  #                            and buffering headroom (Migz1FFMPEG hardcodes
  #                            cq=19 + audio passthrough → too fat for WAN).
  ansible.builtin.copy:
    src: "{{ item.src }}"
    dest: "/opt/tdarr/server/Tdarr/Plugins/Local/{{ item.dest }}"
    owner: "{{ tdarr_puid }}"
    group: "{{ tdarr_pgid }}"
    mode: "0644"
  loop:
    - src: tdarr-plugin-skip-hardlinked.js
      dest: Tdarr_Plugin_homelab_skip_hardlinked.js
    - src: tdarr-plugin-hevc-nvenc-streaming.js
      dest: Tdarr_Plugin_homelab_hevc_nvenc_streaming.js
  loop_control:
    label: "{{ item.dest }}"
  notify: Swap tdarr service

- name: Template .env
  ansible.builtin.template:
    src: env.j2
    dest: /opt/tdarr/.env
    owner: root
    group: root
    mode: "0600"
  no_log: true
  notify: Swap tdarr service

- name: Template docker-compose.yml
  ansible.builtin.template:
    src: docker-compose.yml.j2
    dest: /opt/tdarr/docker-compose.yml
    owner: root
    group: root
    mode: "0644"
  notify: Swap tdarr service

- name: Bring up Tdarr stack
  # Same first-deploy posture as the rest of the stack — `recreate: never`
  # so the per-service handler owns the swap (with --wait gating).
  community.docker.docker_compose_v2:
    project_src: /opt/tdarr
    state: present
    pull: policy
    recreate: never
