---
# Collection versions are pinned to the latest that support ansible-core 2.16
# (Ubuntu 24 LTS's shipped version). Bump when the base OS moves to ≥2.17.
collections:
  - name: community.general
    version: 11.4.7  # requires ansible-core >=2.16
  - name: community.docker
    version: 4.8.7   # requires ansible-core >=2.15
  - name: ansible.posix
    version: 2.1.0
