---
# Single compose project covers gluetun + qbittorrent + prowlarr. Recreating
# without --no-deps lets compose cascade: gluetun comes back first, healthcheck
# blocks until tunnel up, then qBit + Prowlarr start in the new netns.

- name: Swap gluetun stack
  ansible.builtin.command:
    chdir: /opt/gluetun
    cmd: docker compose up -d --wait --wait-timeout 120 --force-recreate
  changed_when: true
