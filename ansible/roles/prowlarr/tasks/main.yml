---
# Prowlarr — config dir only. The container lives in gluetun role's compose
# project (shared netns + healthy-gate require single-project compose).

- name: Ensure /opt/prowlarr layout
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ prowlarr_puid }}"
    group: "{{ prowlarr_pgid }}"
    mode: "0755"
  loop:
    - /opt/prowlarr
    - /opt/prowlarr/config
