---
- name: Ensure /opt/vaultwarden layout
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
    - /opt/vaultwarden
    - /opt/vaultwarden/data

- name: Generate Vaultwarden admin token (idempotent; cached in /etc/homelab/secrets/)
  ansible.builtin.set_fact:
    vaultwarden_admin_token: >-
      {{ lookup('ansible.builtin.password',
                '/etc/homelab/secrets/vaultwarden_admin_token length=64 chars=ascii_letters,digits') }}
  no_log: true

- name: Lock down vaultwarden_admin_token file perms
  ansible.builtin.file:
    path: /etc/homelab/secrets/vaultwarden_admin_token
    owner: root
    group: root
    mode: "0400"

- name: Template .env
  ansible.builtin.template:
    src: env.j2
    dest: /opt/vaultwarden/.env
    owner: root
    group: root
    mode: "0600"
  no_log: true
  notify: Restart vaultwarden stack

- name: Deploy docker-compose.yml
  ansible.builtin.copy:
    src: docker-compose.yml
    dest: /opt/vaultwarden/docker-compose.yml
    owner: root
    group: root
    mode: "0644"
  notify: Restart vaultwarden stack

- name: Bring up Vaultwarden stack
  community.docker.docker_compose_v2:
    project_src: /opt/vaultwarden
    state: present
    pull: policy
