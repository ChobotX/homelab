---
# Vaultwarden — self-hosted Bitwarden-compatible server.
# Fronted by Traefik on the `proxy` network. No host port exposure.
services:
  vaultwarden:
    image: ${VAULTWARDEN_IMAGE}
    container_name: vaultwarden
    restart: unless-stopped
    # SQLite WAL checkpoint + attachment flush need a moment before SIGKILL.
    stop_grace_period: 30s
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    env_file:
      - .env
    volumes:
      - ./data:/data
    networks:
      - proxy
    healthcheck:
      test: ["CMD", "/healthcheck.sh"]
      interval: 60s
      timeout: 10s
      retries: 5
    labels:
      traefik.enable: "true"
      traefik.docker.network: "proxy"

      # Main web UI / API
      traefik.http.routers.vaultwarden.rule: "Host(`${VAULTWARDEN_HOST}`)"
      traefik.http.routers.vaultwarden.entrypoints: "websecure"
      traefik.http.routers.vaultwarden.tls: "true"
      traefik.http.routers.vaultwarden.tls.certresolver: "cloudflare"
      traefik.http.routers.vaultwarden.service: "vaultwarden"
      traefik.http.routers.vaultwarden.middlewares: "wg-only@file,security-headers@file"
      traefik.http.services.vaultwarden.loadbalancer.server.port: "80"
      # Active healthcheck — Traefik buffers new TCP connects while the
      # backend is unhealthy (e.g. mid-swap), turning the recreate gap
      # into a sub-second blip instead of a 502.
      traefik.http.services.vaultwarden.loadbalancer.healthcheck.path: "/alive"
      traefik.http.services.vaultwarden.loadbalancer.healthcheck.interval: "5s"
      traefik.http.services.vaultwarden.loadbalancer.healthcheck.timeout: "2s"

networks:
  proxy:
    external: true
