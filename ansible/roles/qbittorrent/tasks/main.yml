---
# qBittorrent — config dirs + download tree. The container itself lives in
# the gluetun role's compose project (single-project so service:gluetun +
# depends_on: condition: service_healthy work). This role's job: own the
# data layout and the role-default vars (image, port, host) that gluetun's
# env template consumes.

- name: Ensure /opt/qbittorrent layout
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ qbittorrent_puid }}"
    group: "{{ qbittorrent_pgid }}"
    mode: "0755"
  loop:
    - /opt/qbittorrent
    - /opt/qbittorrent/config

- name: Ensure download-root subdirs exist (HDD, via storage bind)
  # /opt/torrents itself is created + bind-mounted by the storage role.
  # Subdirs land on the btrfs target so writes go to HDD; Sonarr/Radarr
  # category hand-off writes here, then hardlinks into /opt/media.
  ansible.builtin.file:
    path: "/opt/torrents/{{ item }}"
    state: directory
    owner: "{{ qbittorrent_puid }}"
    group: "{{ qbittorrent_pgid }}"
    mode: "0755"
  loop:
    - tv
    - movies
    - incomplete
