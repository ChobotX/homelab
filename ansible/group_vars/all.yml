---
# Truly global vars — not per-role. Per-role defaults live in roles/<role>/defaults/main.yml.

ansible_python_interpreter: /usr/bin/python3

timezone: Europe/Prague
locale: en_US.UTF-8

# Reverse-uptime probes. Actual targets live in /etc/homelab/config.yml —
# keep repo defaults generic so no per-instance URLs leak into git.
observability_uptime_http_targets: []
observability_uptime_icmp_targets: []
