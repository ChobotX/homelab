---
- name: Install restic
  ansible.builtin.apt:
    name: restic
    state: present

- name: Ensure /etc/restic directory
  ansible.builtin.file:
    path: /etc/restic
    state: directory
    owner: root
    group: root
    mode: "0700"

- name: Ensure restic cache directory (referenced via XDG_CACHE_HOME in service unit)
  ansible.builtin.file:
    path: /var/cache/restic
    state: directory
    owner: root
    group: root
    mode: "0700"

- name: Ensure node_exporter textfile collector directory
  ansible.builtin.file:
    path: /var/lib/node_exporter/textfile
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Generate restic repo password (idempotent; cached in /etc/homelab/secrets/)
  ansible.builtin.set_fact:
    backup_restic_password: >-
      {{ lookup('ansible.builtin.password',
                '/etc/homelab/secrets/restic_password length=48 chars=ascii_letters,digits') }}
  no_log: true

- name: Lock down restic_password file perms
  ansible.builtin.file:
    path: /etc/homelab/secrets/restic_password
    owner: root
    group: root
    mode: "0400"

- name: Deploy restic environment file (repo URL + credentials + password)
  ansible.builtin.template:
    src: restic.env.j2
    dest: /etc/restic/restic.env
    owner: root
    group: root
    mode: "0600"
  no_log: true

# Compute once: is SFTP the backend? If repo URL starts with `sftp:` AND we have
# a host/user, lay down the SSH key + known_hosts + ssh_config block. Otherwise
# remove them so switching backends doesn't leave stale credentials behind.
- name: Decide SFTP state
  ansible.builtin.set_fact:
    backup_uses_sftp: >-
      {{
        (restic_repo_url | default('')).startswith('sftp:') and
        (restic_sftp_host | default('') | length > 0) and
        (restic_sftp_user | default('') | length > 0) and
        (restic_sftp_private_key | default('') | length > 0)
      }}

- name: Ensure root's ssh dir exists
  ansible.builtin.file:
    path: /root/.ssh
    state: directory
    owner: root
    group: root
    mode: "0700"
  when: backup_uses_sftp

- name: Manage SFTP private key
  ansible.builtin.copy:
    dest: /root/.ssh/homelab_sb_id_ed25519
    content: "{{ restic_sftp_private_key }}"
    owner: root
    group: root
    mode: "0600"
  no_log: true
  when: backup_uses_sftp

- name: Remove SFTP private key when SFTP is not the backend
  ansible.builtin.file:
    path: /root/.ssh/homelab_sb_id_ed25519
    state: absent
  when: not backup_uses_sftp

- name: Scan SFTP host keys (computes known_hosts on the fly)
  ansible.builtin.command:
    argv:
      - ssh-keyscan
      - -t
      - ed25519,rsa
      - "{{ restic_sftp_host }}"
  register: backup_ssh_keyscan
  changed_when: false
  failed_when: backup_ssh_keyscan.rc != 0 or (backup_ssh_keyscan.stdout | length) == 0
  when: backup_uses_sftp

- name: Manage SFTP known_hosts
  ansible.builtin.copy:
    dest: /root/.ssh/known_hosts_sb
    content: "{{ backup_ssh_keyscan.stdout }}\n"
    owner: root
    group: root
    mode: "0644"
  when: backup_uses_sftp

- name: Remove SFTP known_hosts when SFTP is not the backend
  ansible.builtin.file:
    path: /root/.ssh/known_hosts_sb
    state: absent
  when: not backup_uses_sftp

- name: Manage ssh_config host block for Storage Box
  ansible.builtin.blockinfile:
    path: /root/.ssh/config
    create: true
    owner: root
    group: root
    mode: "0600"
    marker: "# {mark} ANSIBLE MANAGED BLOCK: restic storage box"
    state: "{{ 'present' if backup_uses_sftp else 'absent' }}"
    block: |
      Host {{ restic_sftp_host | default('') }}
        User {{ restic_sftp_user | default('') }}
        IdentityFile /root/.ssh/homelab_sb_id_ed25519
        IdentitiesOnly yes
        UserKnownHostsFile /root/.ssh/known_hosts_sb
        StrictHostKeyChecking yes

- name: Deploy exclude list
  ansible.builtin.template:
    src: excludes.j2
    dest: /etc/restic/excludes.txt
    owner: root
    group: root
    mode: "0644"

- name: Deploy backup script
  ansible.builtin.template:
    src: restic-backup.sh.j2
    dest: /usr/local/sbin/restic-backup.sh
    owner: root
    group: root
    mode: "0750"

- name: Initialize restic repo (idempotent)
  # backup_restic_password is always set via the lookup above; the `when`
  # guard is paranoia against an empty on-disk secret file.
  when: backup_restic_password | length > 0
  ansible.builtin.shell: |
    set -a
    . /etc/restic/restic.env
    set +a
    if ! restic snapshots >/dev/null 2>&1; then
      restic init
    fi
  args:
    executable: /bin/bash
  register: backup_restic_init
  changed_when: "'created restic repository' in (backup_restic_init.stdout | default(''))"

- name: Deploy systemd service unit
  ansible.builtin.template:
    src: restic-backup.service.j2
    dest: /etc/systemd/system/restic-backup.service
    owner: root
    group: root
    mode: "0644"
  notify: Reload systemd

- name: Deploy systemd timer unit
  ansible.builtin.template:
    src: restic-backup.timer.j2
    dest: /etc/systemd/system/restic-backup.timer
    owner: root
    group: root
    mode: "0644"
  notify: Reload systemd

- name: Enable and start the backup timer
  ansible.builtin.systemd:
    name: restic-backup.timer
    state: started
    enabled: true
    daemon_reload: true
