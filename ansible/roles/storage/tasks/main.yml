---
# Manages the /mnt/elements btrfs mount and a list of bind mounts that relocate
# growing/log data (observability TSDB, traefik access logs) off the SSD.
#
# Order matters:
#   1. mount /mnt/elements (fstab + live mount) — must be up before we can
#      create the btrfs target dirs underneath it.
#   2. create btrfs target dirs (/mnt/elements/<dst>).
#   3. create mount-point dirs (<src>) — empty, consumer role takes over later.
#   4. add bind mounts (fstab + live mount).
#
# Cutover note: on first rollout the /opt/* src dirs already hold data. An
# active bind mount would HIDE that data under the mountpoint. The one-shot
# migration (rsync + mv old → side) must be done manually BEFORE this role's
# binds activate, otherwise the existing data appears to vanish (still on
# disk under the mountpoint, just shadowed). See README.md cutover procedure.

- name: Ensure /mnt/elements is mounted (fstab + live)
  ansible.posix.mount:
    path: "{{ storage_mount_point }}"
    src: "UUID={{ storage_mount_uuid }}"
    fstype: "{{ storage_mount_fstype }}"
    opts: "{{ storage_mount_opts }}"
    state: mounted

- name: Ensure btrfs target dirs exist
  ansible.builtin.file:
    path: "{{ storage_mount_point }}/{{ item.dst }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop: "{{ storage_binds }}"
  loop_control:
    label: "{{ item.dst }}"

- name: Ensure bind mount-point dirs exist on SSD
  # Empty dirs that bind mounts attach to. Consumer roles (observability,
  # traefik) also declare these — both are idempotent, no conflict.
  ansible.builtin.file:
    path: "{{ item.src }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop: "{{ storage_binds }}"
  loop_control:
    label: "{{ item.src }}"

# ── Migration guard ───────────────────────────────────────────────────────
# Activating a bind mount on top of a non-empty src dir HIDES the existing
# data (the original inodes still exist beneath the mountpoint, but apps see
# only the empty btrfs target). On the first converge for any host that
# already had data on /opt/*, this would silently corrupt the observability
# stack — Prom would start a fresh empty TSDB while 30d of history is
# shadowed underneath.
#
# Refuse to bind unless the src is either already a mountpoint (idempotent
# re-converge) or empty (post-migration or fresh install).

- name: Detect existing mountpoint on each bind src
  ansible.builtin.command: "mountpoint -q {{ item.src }}"
  register: storage_bind_mountpoint
  changed_when: false
  failed_when: false
  loop: "{{ storage_binds }}"
  loop_control:
    label: "{{ item.src }}"

- name: Inventory contents of each bind src
  ansible.builtin.find:
    paths: "{{ item.src }}"
    file_type: any
    hidden: true
  register: storage_bind_contents
  loop: "{{ storage_binds }}"
  loop_control:
    label: "{{ item.src }}"

- name: Refuse to bind onto a non-empty unmigrated src
  ansible.builtin.assert:
    that:
      # Either already mounted (rc=0 → idempotent re-converge) OR empty
      # (rc=1, files=0 → fresh install or post-migration).
      - storage_bind_mountpoint.results[ansible_loop.index0].rc == 0 or
        storage_bind_contents.results[ansible_loop.index0].matched == 0
    fail_msg: |
      {{ item.src }} contains data and is not yet bind-mounted.
      Activating the bind now would HIDE the existing data.
      Migrate manually first: rsync {{ item.src }}/ onto {{ storage_mount_point }}/{{ item.dst }}/,
      then `mv {{ item.src }} {{ item.src }}.pre-elements && mkdir {{ item.src }}`.
      Re-run this playbook afterwards.
  loop: "{{ storage_binds }}"
  loop_control:
    label: "{{ item.src }}"
    extended: true

# ── Btrfs daily snapshot timer ─────────────────────────────────────────────
# Daily read-only snapshot of /mnt/elements into .snapshots/ subvol. Cheap
# CoW; gives < 1s rollback for accidental file deletes. Restic still owns
# off-site recovery; this is the fast-local layer.

- name: Deploy btrfs-snapshot script
  ansible.builtin.copy:
    src: btrfs-snapshot.sh
    dest: /usr/local/sbin/btrfs-snapshot.sh
    owner: root
    group: root
    mode: "0750"
  when: storage_btrfs_snapshot_enabled

- name: Deploy btrfs-snapshot systemd service
  ansible.builtin.template:
    src: btrfs-snapshot.service.j2
    dest: /etc/systemd/system/btrfs-snapshot.service
    owner: root
    group: root
    mode: "0644"
  when: storage_btrfs_snapshot_enabled
  notify: Reload systemd for btrfs-snapshot

- name: Deploy btrfs-snapshot systemd timer
  ansible.builtin.template:
    src: btrfs-snapshot.timer.j2
    dest: /etc/systemd/system/btrfs-snapshot.timer
    owner: root
    group: root
    mode: "0644"
  when: storage_btrfs_snapshot_enabled
  notify: Reload systemd for btrfs-snapshot

- name: Enable btrfs-snapshot timer
  ansible.builtin.systemd:
    name: btrfs-snapshot.timer
    state: started
    enabled: true
    daemon_reload: true
  when: storage_btrfs_snapshot_enabled

- name: Disable btrfs-snapshot timer when toggled off
  ansible.builtin.systemd:
    name: btrfs-snapshot.timer
    state: stopped
    enabled: false
  when: not storage_btrfs_snapshot_enabled
  failed_when: false

- name: Ensure bind mounts are active (fstab + live)
  # x-systemd.requires-mounts-for ties the bind's lifetime to /mnt/elements —
  # if the btrfs disk is absent, the bind refuses to activate (fails loudly)
  # rather than silently attaching to the empty SSD dir and letting writes
  # regress to the SSD we're trying to protect.
  ansible.posix.mount:
    path: "{{ item.src }}"
    src: "{{ storage_mount_point }}/{{ item.dst }}"
    fstype: none
    opts: "bind,x-systemd.requires-mounts-for={{ storage_mount_point }},nofail"
    state: mounted
  loop: "{{ storage_binds }}"
  loop_control:
    label: "{{ item.src }} → {{ storage_mount_point }}/{{ item.dst }}"

# ── Self-heal /opt/media ownership ─────────────────────────────────────────
# Manual rsync/scp drops by root leave files as root:root (sometimes 0700)
# which makes Sonarr/Radarr/Bazarr blind to the library (their PUID/PGID
# matches admin_user's uid). Repair in two phases: detect drift (cheap walk,
# no writes), then repair only when drift exists so the play stays
# idempotent and quiet on a clean tree.
- name: Detect ownership drift under /opt/media
  # NOTE: prior version used `ansible.builtin.shell` with `set -o pipefail`,
  # which fails silently under dash (default /bin/sh on Ubuntu) — the detector
  # registered empty stdout and the repair below was always skipped. Use
  # `command` (no shell needed: no pipe, no glob) to sidestep the trap.
  ansible.builtin.command: >-
    find /opt/media
    ( ! -user {{ admin_user }} -o ! -group {{ admin_user }} )
    -print -quit
  register: storage_media_drift
  changed_when: false
  check_mode: false

- name: Repair /opt/media ownership for {{ admin_user }}
  # Recursive chown on a multi-TB tree is slow but only fires when the
  # detector above flagged drift, so steady state is no-op.
  ansible.builtin.command: chown -R {{ admin_user }}:{{ admin_user }} /opt/media
  when: storage_media_drift.stdout | length > 0
  changed_when: true

- name: Repair /opt/media perms (u=rwX,go=rX)
  # u=rwX,go=rX → +x on dirs and already-executable files only; .mp4/.srt
  # don't gain executable bit.
  ansible.builtin.command: chmod -R u=rwX,go=rX /opt/media
  when: storage_media_drift.stdout | length > 0
  changed_when: true

# ── Self-heal /opt/torrents ownership ──────────────────────────────────────
# Same class of bug as /opt/media: storage_binds creates /opt/torrents as
# root:root 0755, so qBittorrent (PUID 1000) can read its own children but
# can't rename(/data/torrents/incomplete/X, /data/torrents/X) — the rename
# needs write on BOTH parent dirs and the destination parent (/opt/torrents
# itself) is root-owned. Result: every finished torrent fails its move with
# "storage move failed ... Permission denied", Sonarr/Radarr never see the
# import, and the queue stalls. Mirror the /opt/media detect-then-repair so
# the steady state is no-op.
- name: Detect ownership drift under /opt/torrents
  ansible.builtin.command: >-
    find /opt/torrents
    ( ! -user {{ admin_user }} -o ! -group {{ admin_user }} )
    -print -quit
  register: storage_torrents_drift
  changed_when: false
  check_mode: false

- name: Repair /opt/torrents ownership for {{ admin_user }}
  ansible.builtin.command: chown -R {{ admin_user }}:{{ admin_user }} /opt/torrents
  when: storage_torrents_drift.stdout | length > 0
  changed_when: true

- name: Repair /opt/torrents perms (u=rwX,go=rX)
  ansible.builtin.command: chmod -R u=rwX,go=rX /opt/torrents
  when: storage_torrents_drift.stdout | length > 0
  changed_when: true
