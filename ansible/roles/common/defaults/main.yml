---
# Base packages installed on every host.
common_packages:
  - curl
  - ca-certificates
  - gnupg
  - htop
  - git
  - tmux
  - unzip
  - jq
  - vim
  - rsync
  - logrotate
  - dnsutils
  - net-tools
  - iproute2
  # ansible-core itself — keeps drift-proof so deploy never has to install it.
  - ansible-core

# journald retention caps
common_journald_system_max_use: 500M
common_journald_max_retention_sec: 30day

# Unattended-upgrades
# `mode`:
#   security  = only ${distro_id}-security  (conservative, recommended)
#   patch     = security + ${distro_id}-updates  (auto-apply stable patches too)
common_unattended_upgrades_mode: security
common_unattended_upgrades_reboot: "true"
# 04:00 is intentional — restic backup fires at 03:00 with a 15-min random jitter;
# rebooting before backup finishes would SIGTERM an in-flight snapshot.
common_common_unattended_upgrades_reboot_time: "04:00"
# Optional: email address for unattended-upgrades reports. Empty = no emails.
common_unattended_upgrades_mail: ""

# APT packages pinned so unattended-upgrades won't bump major versions.
common_apt_pinned_packages:
  - docker-ce
  - docker-ce-cli
  - containerd.io
