---
# Prometheus alert rules — evaluated every 30s by Prometheus, routed by Alertmanager.
# Grafana's unified alerting mirrors these via file provisioning for UI visibility.
groups:
  - name: host
    interval: 30s
    rules:
      - alert: HostDiskAlmostFull
        expr: |
          (node_filesystem_avail_bytes{mountpoint="/"}
           / node_filesystem_size_bytes{mountpoint="/"}) < 0.1
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Root filesystem <10% free on {{ $labels.instance }}"
          description: "{{ $value | humanizePercentage }} free"

      - alert: HostOutOfMemory
        expr: |
          node_memory_MemAvailable_bytes
          / node_memory_MemTotal_bytes < 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Host memory <10% available on {{ $labels.instance }}"

      - alert: HostHighCpuLoad
        expr: |
          100 - (avg by (instance)
                 (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 90
        for: 15m
        labels:
          severity: warning
        annotations:
          summary: "CPU {{ $value | printf \"%.0f\" }}% sustained on {{ $labels.instance }}"

  - name: containers
    interval: 30s
    rules:
      # Source: docker-state-exporter.sh → textfile collector. One series per
      # container Docker knows about, keyed by `name` — auto-discovered, no
      # allow-list to maintain. Stopped/removed containers drop out naturally.
      - alert: ContainerDown
        expr: docker_container_running == 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Container {{ $labels.name }} not running for >5m"

      - alert: ContainerUnhealthy
        expr: docker_container_health{status="unhealthy"} == 1
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "Container {{ $labels.name }} reporting unhealthy"

      - alert: ContainerRestartStorm
        expr: increase(docker_container_restarts[15m]) > 3
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "Container {{ $labels.name }} restarted {{ $value }}× in 15m"

      - alert: ContainerHighMemory
        expr: |
          (container_memory_working_set_bytes
           / container_spec_memory_limit_bytes) > 0.9
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Container {{ $labels.name }} using >90% of its memory limit"

  - name: backup
    interval: 1m
    rules:
      - alert: BackupDidNotRunRecently
        expr: (time() - restic_last_backup_timestamp_seconds) > 86400 * 2
        for: 15m
        labels:
          severity: critical
        annotations:
          summary: "restic backup stale — last run {{ $value | humanizeDuration }} ago on {{ $labels.instance }}"

  - name: certs
    interval: 1m
    rules:
      - alert: CertExpiringSoon
        expr: (traefik_tls_certs_not_after - time()) < 7 * 86400
        for: 1h
        labels:
          severity: warning
        annotations:
          summary: "TLS cert for {{ $labels.sans }} expires in <7d"
