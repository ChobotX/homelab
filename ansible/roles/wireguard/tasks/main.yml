---
- name: Ensure wireguard tooling is installed
  ansible.builtin.apt:
    name:
      - wireguard
      - wireguard-tools
    state: present

- name: Refuse to proceed without bootstrap-generated private key
  ansible.builtin.stat:
    path: /etc/wireguard/privatekey
  register: wireguard_privkey_stat

- name: Fail if private key is missing
  ansible.builtin.fail:
    msg: >
      /etc/wireguard/privatekey is missing. bootstrap.sh must run on the homelab
      console first (it generates the keypair). Ansible never regenerates the key.
  when: not wireguard_privkey_stat.stat.exists

- name: Read WG private key (never regenerated here)
  ansible.builtin.slurp:
    src: /etc/wireguard/privatekey
  register: wireguard_privkey_content
  no_log: true

- name: Read WG public key (so roles / reports can reference it)
  ansible.builtin.slurp:
    src: /etc/wireguard/publickey
  register: wireguard_pubkey_content

- name: Expose WG pubkey as a host fact
  ansible.builtin.set_fact:
    wireguard_pubkey: "{{ (wireguard_pubkey_content.content | b64decode).strip() }}"

- name: Check for WG preshared key
  ansible.builtin.stat:
    path: /etc/wireguard/hub_psk
  register: wireguard_psk_stat

- name: Read WG preshared key (optional — used if present)
  ansible.builtin.slurp:
    src: /etc/wireguard/hub_psk
  register: wireguard_psk_content
  when: wireguard_psk_stat.stat.exists
  no_log: true

- name: Ensure /etc/wireguard directory mode
  ansible.builtin.file:
    path: /etc/wireguard
    state: directory
    owner: root
    group: root
    mode: "0700"

- name: Template wg0.conf
  ansible.builtin.template:
    src: wg0.conf.j2
    dest: /etc/wireguard/wg0.conf
    owner: root
    group: root
    mode: "0600"
  no_log: true
  notify: Reload wg0

- name: Enable wg-quick@wg0
  ansible.builtin.systemd:
    name: wg-quick@wg0
    enabled: true
    state: started
