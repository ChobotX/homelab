---
- name: Ensure /opt/traefik layout
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
    - /opt/traefik
    - /opt/traefik/dynamic

- name: Ensure acme directory exists (0700 is enough — Traefik creates acme.json at 0600)
  ansible.builtin.file:
    path: /opt/traefik/letsencrypt
    state: directory
    owner: root
    group: root
    mode: "0700"

- name: Ensure Traefik logs directory exists
  ansible.builtin.file:
    path: /opt/traefik/logs
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Create shared proxy network
  community.docker.docker_network:
    name: proxy
    state: present

- name: Template traefik.yml (static config)
  ansible.builtin.template:
    src: traefik.yml.j2
    dest: /opt/traefik/traefik.yml
    owner: root
    group: root
    mode: "0644"
  notify: Restart traefik stack

- name: Template dynamic middlewares config
  ansible.builtin.template:
    src: dynamic-middlewares.yml.j2
    dest: /opt/traefik/dynamic/middlewares.yml
    owner: root
    group: root
    mode: "0644"
  notify: Restart traefik stack

- name: Template .env
  ansible.builtin.template:
    src: env.j2
    dest: /opt/traefik/.env
    owner: root
    group: root
    mode: "0600"
  no_log: true
  notify: Restart traefik stack

- name: Deploy docker-compose.yml
  ansible.builtin.copy:
    src: docker-compose.yml
    dest: /opt/traefik/docker-compose.yml
    owner: root
    group: root
    mode: "0644"
  notify: Restart traefik stack

- name: Bring up Traefik stack
  community.docker.docker_compose_v2:
    project_src: /opt/traefik
    state: present
    pull: policy
