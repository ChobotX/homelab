---
- name: Ensure /opt/hermes layout
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner }}"
    group: "{{ item.owner }}"
    mode: "0755"
  loop:
    - { path: /opt/hermes, owner: root }
    # Bind-mounted to /opt/data (config.yaml, .env, memory, skills, sessions).
    # Pre-own to the app uid so a first-boot race can't leave config root-owned.
    - { path: "{{ hermes_data_dir }}", owner: "{{ hermes_data_uid }}" }

- name: Ensure agent bin dir (bind-mounted, prepended to PATH via .env)
  ansible.builtin.file:
    path: "{{ hermes_data_dir }}/bin"
    state: directory
    owner: "{{ hermes_data_uid }}"
    group: "{{ hermes_data_uid }}"
    mode: "0755"

# The image ships rg/curl/git/node/python3 but not jq. Drop a pinned static
# jq into the bind-mounted bin dir (survives recreate); the agent can add more
# tools there itself. get_url short-circuits on the sha256 match.
- name: Install jq into agent bin
  ansible.builtin.get_url:
    url: "https://github.com/jqlang/jq/releases/download/jq-{{ hermes_jq_version }}/jq-linux-amd64"
    dest: "{{ hermes_data_dir }}/bin/jq"
    checksum: "sha256:{{ hermes_jq_sha256 }}"
    owner: "{{ hermes_data_uid }}"
    group: "{{ hermes_data_uid }}"
    mode: "0755"

- name: Template compose-interpolation .env
  ansible.builtin.template:
    src: env.j2
    dest: /opt/hermes/.env
    owner: root
    group: root
    mode: "0600"
  notify: Swap hermes service

# Hermes rewrites config.yaml on every start, expanding it to its full schema
# (_config_version, all defaults merged). Templating it each converge would
# diff against that expanded file and churn-restart the container forever, so
# seed it ONCE; Hermes owns it afterwards. Change config via the dashboard or
# edit the file on-host (or delete it to re-seed from this template).
- name: Check for existing Hermes config
  ansible.builtin.stat:
    path: "{{ hermes_data_dir }}/config.yaml"
  register: hermes_config_stat

- name: Seed Hermes config (first converge only)
  ansible.builtin.template:
    src: config.yaml.j2
    dest: "{{ hermes_data_dir }}/config.yaml"
    owner: "{{ hermes_data_uid }}"
    group: "{{ hermes_data_uid }}"
    mode: "0640"
  when: not hermes_config_stat.stat.exists
  notify: Swap hermes service

# Same seed-once contract as config.yaml: the honcho plugin rewrites this
# file itself (oauth rotation, wizard edits), so Hermes owns it after seeding.
- name: Check for existing Honcho plugin config
  ansible.builtin.stat:
    path: "{{ hermes_data_dir }}/honcho.json"
  register: hermes_honcho_json_stat

- name: Seed Honcho plugin config (first converge only)
  ansible.builtin.template:
    src: honcho.json.j2
    dest: "{{ hermes_data_dir }}/honcho.json"
    owner: "{{ hermes_data_uid }}"
    group: "{{ hermes_data_uid }}"
    mode: "0640"
  when: not hermes_honcho_json_stat.stat.exists
  notify: Swap hermes service

- name: Template Hermes runtime secrets (.env)
  ansible.builtin.template:
    src: data-env.j2
    dest: "{{ hermes_data_dir }}/.env"
    owner: "{{ hermes_data_uid }}"
    group: "{{ hermes_data_uid }}"
    mode: "0600"
  no_log: true
  notify: Swap hermes service

- name: Deploy docker-compose.yml
  ansible.builtin.copy:
    src: docker-compose.yml
    dest: /opt/hermes/docker-compose.yml
    owner: root
    group: root
    mode: "0644"
  notify: Swap hermes service

- name: Bring up hermes stack
  # First-deploy safety net. `recreate: never` leaves a running container
  # untouched on compose/image changes so the handler owns every swap.
  community.docker.docker_compose_v2:
    project_src: /opt/hermes
    state: present
    pull: policy
    recreate: never

# Vendor the ddgs web-search package into the bind-mounted pylib so it survives
# recreate (PYTHONPATH=/opt/data/pylib in .env makes Hermes import it). primp,
# a ddgs dep, is a compiled wheel — installing INSIDE the container picks the
# wheel for the container's arch/abi (a host pip could grab the wrong one).
# Idempotent: the install is skipped once the package dir exists; to upgrade,
# delete data/pylib and reconverge (same seed-once spirit as the config above).
- name: Check for vendored ddgs web-search package
  ansible.builtin.stat:
    path: "{{ hermes_data_dir }}/pylib/ddgs"
  register: hermes_ddgs_stat

- name: Vendor ddgs into the bind-mounted pylib
  community.docker.docker_container_exec:
    container: hermes
    # Run as the app uid so the files land owned by it (the dir is its own).
    user: "{{ hermes_data_uid }}"
    # The image ships python3 + curl but NOT pip. Bootstrap pip from the
    # self-contained get-pip.py into an ephemeral /tmp dir, then use it to
    # install ddgs into the persistent bind-mount. --target keeps the install
    # local (no system site-packages write, sidesteps PEP-668). primp/lxml are
    # compiled wheels — running here picks the container's arch/abi.
    argv:
      - /bin/sh
      - -c
      - >-
        curl -fsSL https://bootstrap.pypa.io/get-pip.py -o /tmp/get-pip.py &&
        python3 /tmp/get-pip.py --quiet --no-cache-dir --target /tmp/pipboot &&
        PYTHONPATH=/tmp/pipboot python3 -m pip install --no-cache-dir
        --disable-pip-version-check --target /opt/data/pylib
        ddgs=={{ hermes_ddgs_version }}
  when: not hermes_ddgs_stat.stat.exists
  notify: Swap hermes service

# Same vendoring pattern for the honcho-ai SDK (memory plugin import).
- name: Check for vendored honcho-ai package
  ansible.builtin.stat:
    path: "{{ hermes_data_dir }}/pylib/honcho"
  register: hermes_honcho_ai_stat

- name: Vendor honcho-ai into the bind-mounted pylib
  community.docker.docker_container_exec:
    container: hermes
    user: "{{ hermes_data_uid }}"
    argv:
      - /bin/sh
      - -c
      - >-
        curl -fsSL https://bootstrap.pypa.io/get-pip.py -o /tmp/get-pip.py &&
        python3 /tmp/get-pip.py --quiet --no-cache-dir --target /tmp/pipboot &&
        PYTHONPATH=/tmp/pipboot python3 -m pip install --no-cache-dir
        --disable-pip-version-check --target /opt/data/pylib --upgrade
        honcho-ai=={{ hermes_honcho_ai_version }}
  when: not hermes_honcho_ai_stat.stat.exists
  notify: Swap hermes service
