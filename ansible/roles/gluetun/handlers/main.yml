---
# Gluetun swap is more sensitive than a normal compose swap: stopping the
# container destroys the netns, which drags qBittorrent + Prowlarr down with
# it (they share the netns via network_mode: service:gluetun). --wait gates
# on gluetun's own healthcheck (tunnel up) so the sidecar containers aren't
# restarted against a half-initialised VPN.
#
# qBit/Prowlarr restart themselves when gluetun restarts via their own
# `restart: unless-stopped` + docker's network_mode re-attachment logic;
# no explicit swap needed here for them.

- name: Swap gluetun service
  ansible.builtin.command:
    chdir: /opt/gluetun
    cmd: docker compose up -d --wait --no-deps --force-recreate gluetun
  changed_when: true
