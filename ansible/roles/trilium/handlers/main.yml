---
# `up --wait` + the container healthcheck (/api/health-check) + Traefik's
# active loadbalancer healthcheck give a sub-second user-visible gap on a
# trilium swap. The MCP/ETAPI clients retry, so a brief blip is benign.
#
# `--no-deps` is harmless here (single service) but kept for parity with the
# other app roles.
- name: Swap trilium service
  ansible.builtin.command:
    chdir: /opt/trilium
    cmd: docker compose up -d --wait --no-deps --force-recreate trilium
  changed_when: true
