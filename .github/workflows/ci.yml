---
name: ci

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tags:
        description: "Ansible --tags filter (blank = full run). Deploy only."
        required: false
        default: ""
      check:
        description: "Run deploy as --check only (no changes)"
        type: boolean
        default: false
  # Weekly full reconverge to heal host drift that the per-role change gate
  # would otherwise skip. Sunday 03:30 UTC — after restic backup's 03:00 CEST
  # window finishes; `detect-changes.sh` forces all app buckets true for
  # schedule events.
  schedule:
    - cron: '30 3 * * 0'

# Hard-coded permission floor — fork PRs never see secrets.
permissions:
  contents: read

# Newer pushes cancel older in-flight runs on the same ref. Deploys are
# idempotent (Ansible converges), so cancelling a mid-deploy is safe — the
# next run restarts from a clean workspace and re-converges.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint (yamllint + ansible-lint + gitleaks + shellcheck)
    # Skip fork PRs — self-hosted runner must never execute untrusted code.
    if: >-
      github.event_name != 'pull_request'
      || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: [self-hosted, linux, homelab]
    timeout-minutes: 10
    env:
      # Persistent host cache (bootstrap.sh creates dir, chowns to gha-runner).
      # Propagates to every step in this job — including ansible-lint, which
      # honours ANSIBLE_COLLECTIONS_PATH when loading the pinned collections.
      PIP_CACHE_DIR: /opt/gha-cache/pip
      ANSIBLE_COLLECTIONS_PATH: /opt/gha-cache/ansible-collections
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - name: Forbid mixed WG subnets (docs/code drift guard)
        run: |
          # `tests/` uses an intentionally-different subnet to catch hardcoded
          # values — exclude from the guard.
          conflicts=$(grep -rEho '10\.[0-9]+\.0\.0/24' \
            --exclude-dir=.git --exclude-dir=node_modules --exclude-dir=tests . \
            | sort -u | wc -l)
          if [ "$conflicts" -gt 1 ]; then
            echo "::error::multiple WG subnets found (non-test files):"
            grep -rEno '10\.[0-9]+\.0\.0/24' \
              --exclude-dir=.git --exclude-dir=tests . | sort -u
            exit 1
          fi

      - name: Forbid unsafe triggers on self-hosted runner
        # pull_request_target and workflow_run on a public repo + self-hosted
        # runner are a known unauth-RCE vector. Refuse to merge workflows that
        # introduce them.
        run: |
          if grep -rEn '^[[:space:]]*(pull_request_target|workflow_run):' .github/workflows/; then
            echo "::error::workflow uses pull_request_target or workflow_run — unsafe with a self-hosted runner"
            exit 1
          fi

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.12"

      - name: Install ansible + yamllint + collections
        # Install into setup-python's interpreter (lives under _work/_tool, JIT-wiped
        # between jobs). Avoid `pip install --user` on self-hosted: writes to
        # $HOME/.local which persists across jobs, so a runner-dir migration
        # (e.g. /opt/actions-runner → /opt/actions-runner-N) leaves stale
        # shebangs in ~/.local/bin pointing at a Python that no longer exists,
        # and subsequent pip runs skip reinstall ("already satisfied") so
        # shebangs never get refreshed → exit 127.
        # galaxy is idempotent without --force: reads pinned version from the
        # persistent cache dir, skips install when already present.
        run: |
          core_version=$(cat .ansible-version)
          pip install "ansible-core==${core_version}" "yamllint==1.38.0"
          mkdir -p /opt/gha-cache/ansible-collections
          flock /opt/gha-cache/ansible-collections/.lock \
            ansible-galaxy collection install -r ansible/requirements.yml

      - name: yamllint
        run: yamllint .

      - uses: ansible/ansible-lint@5fac056c45595896c973fbde871f01f6cb14d74c  # v26.4.0
        with:
          args: "--profile=basic"
          working_directory: ansible

      - name: gitleaks (binary, avoids Node 20 deprecation on the JS action)
        env:
          GITLEAKS_VERSION: "8.30.1"
          GITLEAKS_SHA256: "551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb"
        run: |
          set -euo pipefail
          tarball="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          curl -fsSL -o "/tmp/${tarball}" \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/${tarball}"
          echo "${GITLEAKS_SHA256}  /tmp/${tarball}" | sha256sum -c -
          tar -xzf "/tmp/${tarball}" -C /tmp gitleaks
          /tmp/gitleaks detect --no-banner --redact --verbose --exit-code 1 --source .

      - uses: ludeeus/action-shellcheck@00cae500b08a931fb5698e11e79bfbd38e612a38  # v2.0.0
        with:
          scandir: "./"
          severity: warning

  docker-test:
    name: docker test harness (apply safe roles in Ubuntu 24 container)
    # Skip fork PRs — self-hosted runner must never execute untrusted code.
    if: >-
      github.event_name != 'pull_request'
      || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: [self-hosted, linux, homelab]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Run tests/docker/test.sh apply
        run: ./tests/docker/test.sh apply

  prewarm-images:
    # Pre-pull every image referenced by role compose files so the `deploy`
    # job's `docker_compose_v2` in observability / traefik / apps finds the
    # layers already on the daemon (same host — compose and prewarm share one
    # /var/lib/docker). Soft-parallel with lint + docker-test: no `needs:`,
    # no downstream `needs:` — deploy does NOT block on prewarm. Worst case:
    # prewarm is slower than the gate, ansible falls back to its own pull.
    name: prewarm docker images
    if: >-
      github.event_name != 'pull_request'
      || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: [self-hosted, linux, homelab]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Pre-pull compose images
        run: ./scripts/prewarm-images.sh

  # ─────────────────────────────────────────────────────────────────────
  # Deploy DAG (push to main). Shape:
  #
  #     lint + docker-test ──┐
  #                          ▼
  #                       changes
  #                          │
  #                    deploy-common
  #         ┌──────┬────────┬──┴────┬────────┬────────┐
  #         ▼      ▼        ▼       ▼        ▼        ▼
  #        wg     ssh     f2b   storage   docker     (ufw needs wg)
  #         │
  #         └────► deploy-ufw
  #
  #     (all infra jobs change-gated; !failure() && !cancelled() lets a
  #      skipped upstream not cascade-skip downstream)
  #                          │
  #     ┌────────────┬───────┴───┬───────────┬──────────┬────────────┐
  #     ▼            ▼           ▼           ▼          ▼            ▼
  # deploy-obs  deploy-traefik  deploy-vw  deploy-jf  deploy-st  deploy-homepage
  #     └────────────┴───────────┴─────┬─────┴──────────┴────────────┘
  #                                    ▼
  #                              deploy-backup
  #                                    │
  #                                    ▼
  #                             deploy-finalize
  #                          (smoke-deploy.sh + ntfy push)
  #
  # Every deploy job is change-gated; weekly schedule force-fulls via
  # detect-changes.sh. Infra jobs run in parallel after deploy-common (ufw
  # serialises behind wireguard — rules reference the WG iface). App jobs
  # run in parallel on separate self-hosted runner instances
  # (`GITHUB_RUNNER_INSTANCES=12` in bootstrap.sh). Precondition fixes:
  #   - apache2-utils is in common_packages (was inline apt in traefik role)
  #   - `proxy` + `observability` networks are created at end of docker role
  # Handler scope was already role-local; no cross-role `notify:` edges.
  #
  # Manual workflow_dispatch is served by `deploy-manual` below — a single
  # sequential job that honours `inputs.tags` / `inputs.check` exactly like
  # the legacy `deploy` job.
  # ─────────────────────────────────────────────────────────────────────

  changes:
    # Per-role change detection. Emits booleans per app bucket; see
    # scripts/detect-changes.sh. `shared=true` forces every app bucket true
    # (playbook / group_vars / common role / ci plumbing changes).
    name: detect changed role buckets
    needs: [lint, docker-test]
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/main')
      || github.event_name == 'schedule'
    runs-on: [self-hosted, linux, homelab]
    timeout-minutes: 3
    outputs:
      shared: ${{ steps.detect.outputs.shared }}
      common: ${{ steps.detect.outputs.common }}
      qos: ${{ steps.detect.outputs.qos }}
      wireguard: ${{ steps.detect.outputs.wireguard }}
      ufw: ${{ steps.detect.outputs.ufw }}
      ssh: ${{ steps.detect.outputs.ssh }}
      fail2ban: ${{ steps.detect.outputs.fail2ban }}
      storage: ${{ steps.detect.outputs.storage }}
      docker: ${{ steps.detect.outputs.docker }}
      nvidia_container: ${{ steps.detect.outputs.nvidia_container }}
      observability: ${{ steps.detect.outputs.observability }}
      traefik: ${{ steps.detect.outputs.traefik }}
      vaultwarden: ${{ steps.detect.outputs.vaultwarden }}
      jellyfin: ${{ steps.detect.outputs.jellyfin }}
      tdarr: ${{ steps.detect.outputs.tdarr }}
      syncthing: ${{ steps.detect.outputs.syncthing }}
      gluetun: ${{ steps.detect.outputs.gluetun }}
      qbittorrent: ${{ steps.detect.outputs.qbittorrent }}
      prowlarr: ${{ steps.detect.outputs.prowlarr }}
      flaresolverr: ${{ steps.detect.outputs.flaresolverr }}
      sonarr: ${{ steps.detect.outputs.sonarr }}
      radarr: ${{ steps.detect.outputs.radarr }}
      bazarr: ${{ steps.detect.outputs.bazarr }}
      n8n: ${{ steps.detect.outputs.n8n }}
      ollama: ${{ steps.detect.outputs.ollama }}
      homepage: ${{ steps.detect.outputs.homepage }}
      backup: ${{ steps.detect.outputs.backup }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          # Need BASE reachable in the clone; push events set event.before but
          # a shallow clone may not have it. fetch-depth:0 covers force-pushes
          # and first pushes (where detect-changes.sh falls back to full anyway).
          fetch-depth: 0

      - name: Detect changes
        id: detect
        run: ./scripts/detect-changes.sh "${{ github.event.before }}" "${{ github.sha }}"

  deploy-common:
    # base pkgs/users/paths — gate for every other infra role. Weekly
    # schedule force-fulls to heal any host-side drift.
    name: deploy (common)
    needs: [lint, docker-test, changes]
    if: >-
      ((github.event_name == 'push' && github.ref == 'refs/heads/main')
       || github.event_name == 'schedule')
      && needs.changes.outputs.common == 'true'
    runs-on: [self-hosted, linux, homelab]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ github.sha }}
      - uses: ./.github/actions/deploy-tags
        with:
          tags: common

  deploy-qos:
    # Traffic shaping (HTB + IFB) on the physical NIC. Intentionally early
    # in the DAG — gets applied before heavy-network roles (ollama model
    # pulls, observability image prewarms) so they run capped from the start.
    # No downstream `needs:` edges; other roles don't depend on tc rules.
    name: deploy (qos)
    needs: [deploy-common, changes]
    if: >-
      !failure() && !cancelled()
      && ((github.event_name == 'push' && github.ref == 'refs/heads/main')
          || github.event_name == 'schedule')
      && needs.changes.outputs.qos == 'true'
    runs-on: [self-hosted, linux, homelab]
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ github.sha }}
      - uses: ./.github/actions/deploy-tags
        with:
          tags: qos

  deploy-wireguard:
    name: deploy (wireguard)
    needs: [deploy-common, changes]
    if: >-
      !failure() && !cancelled()
      && ((github.event_name == 'push' && github.ref == 'refs/heads/main')
          || github.event_name == 'schedule')
      && needs.changes.outputs.wireguard == 'true'
    runs-on: [self-hosted, linux, homelab]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ github.sha }}
      - uses: ./.github/actions/deploy-tags
        with:
          tags: wireguard

  deploy-ufw:
    # Rules reference the WG iface — serialise behind wireguard so a fresh
    # reconverge of both lands in order.
    name: deploy (ufw)
    needs: [deploy-common, deploy-wireguard, changes]
    if: >-
      !failure() && !cancelled()
      && ((github.event_name == 'push' && github.ref == 'refs/heads/main')
          || github.event_name == 'schedule')
      && needs.changes.outputs.ufw == 'true'
    runs-on: [self-hosted, linux, homelab]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ github.sha }}
      - uses: ./.github/actions/deploy-tags
        with:
          tags: ufw

  deploy-ssh:
    name: deploy (ssh)
    needs: [deploy-common, changes]
    if: >-
      !failure() && !cancelled()
      && ((github.event_name == 'push' && github.ref == 'refs/heads/main')
          || github.event_name == 'schedule')
      && needs.changes.outputs.ssh == 'true'
    runs-on: [self-hosted, linux, homelab]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ github.sha }}
      - uses: ./.github/actions/deploy-tags
        with:
          tags: ssh

  deploy-fail2ban:
    name: deploy (fail2ban)
    needs: [deploy-common, changes]
    if: >-
      !failure() && !cancelled()
      && ((github.event_name == 'push' && github.ref == 'refs/heads/main')
          || github.event_name == 'schedule')
      && needs.changes.outputs.fail2ban == 'true'
    runs-on: [self-hosted, linux, homelab]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ github.sha }}
      - uses: ./.github/actions/deploy-tags
        with:
          tags: fail2ban

  deploy-storage:
    name: deploy (storage)
    needs: [deploy-common, changes]
    if: >-
      !failure() && !cancelled()
      && ((github.event_name == 'push' && github.ref == 'refs/heads/main')
          || github.event_name == 'schedule')
      && needs.changes.outputs.storage == 'true'
    runs-on: [self-hosted, linux, homelab]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ github.sha }}
      - uses: ./.github/actions/deploy-tags
        with:
          tags: storage

  deploy-docker:
    # Creates `proxy` + `observability` networks the app compose stacks
    # attach to — apps gate on this job's completion (skipped-OK).
    name: deploy (docker)
    needs: [deploy-common, changes]
    if: >-
      !failure() && !cancelled()
      && ((github.event_name == 'push' && github.ref == 'refs/heads/main')
          || github.event_name == 'schedule')
      && needs.changes.outputs.docker == 'true'
    runs-on: [self-hosted, linux, homelab]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ github.sha }}
      - uses: ./.github/actions/deploy-tags
        with:
          tags: docker

  deploy-nvidia-container:
    # Registers the `nvidia` docker runtime (via docker daemon.json template
    # + nvidia-container-toolkit apt package). Skipped when host has no
    # NVIDIA GPU — the role's first task asserts nvidia_gpu_enabled.
    name: deploy (nvidia_container)
    needs: [deploy-docker, changes]
    if: >-
      !failure() && !cancelled()
      && ((github.event_name == 'push' && github.ref == 'refs/heads/main')
          || github.event_name == 'schedule')
      && needs.changes.outputs.nvidia_container == 'true'
    runs-on: [self-hosted, linux, homelab]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ github.sha }}
      - uses: ./.github/actions/deploy-tags
        with:
          tags: nvidia

  deploy-observability:
    name: deploy (observability)
    needs: [deploy-docker, deploy-ufw, changes]
    if: >-
      !failure() && !cancelled()
      && ((github.event_name == 'push' && github.ref == 'refs/heads/main')
          || github.event_name == 'schedule')
      && needs.changes.outputs.observability == 'true'
    runs-on: [self-hosted, linux, homelab]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ github.sha }}
      - uses: ./.github/actions/deploy-tags
        with:
          tags: observability

  deploy-traefik:
    name: deploy (traefik)
    needs: [deploy-docker, deploy-ufw, changes]
    if: >-
      !failure() && !cancelled()
      && ((github.event_name == 'push' && github.ref == 'refs/heads/main')
          || github.event_name == 'schedule')
      && needs.changes.outputs.traefik == 'true'
    runs-on: [self-hosted, linux, homelab]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ github.sha }}
      - uses: ./.github/actions/deploy-tags
        with:
          tags: traefik

  deploy-vaultwarden:
    name: deploy (vaultwarden)
    needs: [deploy-docker, deploy-ufw, changes]
    if: >-
      !failure() && !cancelled()
      && ((github.event_name == 'push' && github.ref == 'refs/heads/main')
          || github.event_name == 'schedule')
      && needs.changes.outputs.vaultwarden == 'true'
    runs-on: [self-hosted, linux, homelab]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ github.sha }}
      - uses: ./.github/actions/deploy-tags
        with:
          tags: vaultwarden

  deploy-jellyfin:
    name: deploy (jellyfin)
    needs: [deploy-docker, deploy-ufw, changes]
    if: >-
      !failure() && !cancelled()
      && ((github.event_name == 'push' && github.ref == 'refs/heads/main')
          || github.event_name == 'schedule')
      && needs.changes.outputs.jellyfin == 'true'
    runs-on: [self-hosted, linux, homelab]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ github.sha }}
      - uses: ./.github/actions/deploy-tags
        with:
          tags: jellyfin

  deploy-tdarr:
    # Tdarr — automated transcode farm. Gates on nvidia_container so the GPU
    # runtime is registered before tdarr's compose tries `runtime: nvidia`.
    # Same skipped-upstream tolerance as deploy-jellyfin: `!failure() &&
    # !cancelled()` lets it run when nvidia_container was a no-op skip.
    #
    # MUST also wait on deploy-storage. Tdarr role chowns /opt/tdarr/cache to
    # PUID 1000 (linuxserver-style image), but that path is a bind mount
    # owned by storage role. Without this `needs:` edge the two jobs race in
    # parallel — tdarr chown fires on the SSD-side dir, then storage's bind
    # activate shadows it with the root-owned btrfs subdir, leaving the
    # live mount root:root and Tdarr's transcode worker unable to write
    # scratch (EACCES).
    name: deploy (tdarr)
    needs: [deploy-docker, deploy-ufw, deploy-nvidia-container, deploy-storage, changes]
    if: >-
      !failure() && !cancelled()
      && ((github.event_name == 'push' && github.ref == 'refs/heads/main')
          || github.event_name == 'schedule')
      && needs.changes.outputs.tdarr == 'true'
    runs-on: [self-hosted, linux, homelab]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ github.sha }}
      - uses: ./.github/actions/deploy-tags
        with:
          tags: tdarr

  deploy-syncthing:
    name: deploy (syncthing)
    needs: [deploy-docker, deploy-ufw, changes]
    if: >-
      !failure() && !cancelled()
      && ((github.event_name == 'push' && github.ref == 'refs/heads/main')
          || github.event_name == 'schedule')
      && needs.changes.outputs.syncthing == 'true'
    runs-on: [self-hosted, linux, homelab]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ github.sha }}
      - uses: ./.github/actions/deploy-tags
        with:
          tags: syncthing

  deploy-gluetun:
    # Brings up the gluetun + qbittorrent + prowlarr compose project.
    # Waits on deploy-qbittorrent + deploy-prowlarr so their config dirs
    # (/opt/qbittorrent/config, /opt/prowlarr/config) and the torrents
    # subdirs exist before compose binds them. Also waits on traefik
    # since gluetun's container labels need traefik running to take effect.
    name: deploy (gluetun)
    needs: [deploy-docker, deploy-ufw, deploy-traefik, deploy-qbittorrent, deploy-prowlarr, deploy-flaresolverr, changes]
    if: >-
      !failure() && !cancelled()
      && ((github.event_name == 'push' && github.ref == 'refs/heads/main')
          || github.event_name == 'schedule')
      && needs.changes.outputs.gluetun == 'true'
    runs-on: [self-hosted, linux, homelab]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ github.sha }}
      - uses: ./.github/actions/deploy-tags
        with:
          tags: gluetun

  deploy-qbittorrent:
    # Owns /opt/qbittorrent/config + /opt/torrents/{tv,movies,incomplete}
    # dirs only — the container runs in gluetun's compose project. Must
    # converge before deploy-gluetun so the bind sources exist.
    name: deploy (qbittorrent)
    needs: [deploy-docker, deploy-ufw, deploy-storage, changes]
    if: >-
      !failure() && !cancelled()
      && ((github.event_name == 'push' && github.ref == 'refs/heads/main')
          || github.event_name == 'schedule')
      && needs.changes.outputs.qbittorrent == 'true'
    runs-on: [self-hosted, linux, homelab]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ github.sha }}
      - uses: ./.github/actions/deploy-tags
        with:
          tags: qbittorrent

  deploy-prowlarr:
    # Owns /opt/prowlarr/config dir only — container runs in gluetun's
    # compose project. Converges before deploy-gluetun.
    name: deploy (prowlarr)
    needs: [deploy-docker, deploy-ufw, deploy-storage, changes]
    if: >-
      !failure() && !cancelled()
      && ((github.event_name == 'push' && github.ref == 'refs/heads/main')
          || github.event_name == 'schedule')
      && needs.changes.outputs.prowlarr == 'true'
    runs-on: [self-hosted, linux, homelab]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ github.sha }}
      - uses: ./.github/actions/deploy-tags
        with:
          tags: prowlarr

  deploy-flaresolverr:
    # No host-side tasks (defaults-only role). Container provisioned by the
    # gluetun compose project. This job exists so detect-changes can route
    # flaresolverr-bucket changes (image bump, port change) into the deploy
    # DAG; the cascade in detect-changes also flips gluetun=true so the
    # compose project actually recreates.
    name: deploy (flaresolverr)
    needs: [deploy-docker, deploy-ufw, changes]
    if: >-
      !failure() && !cancelled()
      && ((github.event_name == 'push' && github.ref == 'refs/heads/main')
          || github.event_name == 'schedule')
      && needs.changes.outputs.flaresolverr == 'true'
    runs-on: [self-hosted, linux, homelab]
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ github.sha }}
      - uses: ./.github/actions/deploy-tags
        with:
          tags: flaresolverr

  deploy-sonarr:
    # Direct on `arr` docker network. Talks to Prowlarr/qBit through gluetun
    # but doesn't need the tunnel itself, so it only depends on traefik.
    name: deploy (sonarr)
    needs: [deploy-docker, deploy-ufw, deploy-traefik, changes]
    if: >-
      !failure() && !cancelled()
      && ((github.event_name == 'push' && github.ref == 'refs/heads/main')
          || github.event_name == 'schedule')
      && needs.changes.outputs.sonarr == 'true'
    runs-on: [self-hosted, linux, homelab]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ github.sha }}
      - uses: ./.github/actions/deploy-tags
        with:
          tags: sonarr

  deploy-radarr:
    name: deploy (radarr)
    needs: [deploy-docker, deploy-ufw, deploy-traefik, changes]
    if: >-
      !failure() && !cancelled()
      && ((github.event_name == 'push' && github.ref == 'refs/heads/main')
          || github.event_name == 'schedule')
      && needs.changes.outputs.radarr == 'true'
    runs-on: [self-hosted, linux, homelab]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ github.sha }}
      - uses: ./.github/actions/deploy-tags
        with:
          tags: radarr

  deploy-bazarr:
    name: deploy (bazarr)
    needs: [deploy-docker, deploy-ufw, deploy-traefik, changes]
    if: >-
      !failure() && !cancelled()
      && ((github.event_name == 'push' && github.ref == 'refs/heads/main')
          || github.event_name == 'schedule')
      && needs.changes.outputs.bazarr == 'true'
    runs-on: [self-hosted, linux, homelab]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ github.sha }}
      - uses: ./.github/actions/deploy-tags
        with:
          tags: bazarr

  deploy-n8n:
    name: deploy (n8n)
    needs: [deploy-docker, deploy-ufw, changes]
    if: >-
      !failure() && !cancelled()
      && ((github.event_name == 'push' && github.ref == 'refs/heads/main')
          || github.event_name == 'schedule')
      && needs.changes.outputs.n8n == 'true'
    runs-on: [self-hosted, linux, homelab]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ github.sha }}
      - uses: ./.github/actions/deploy-tags
        with:
          tags: n8n

  deploy-ollama:
    # Waits for the nvidia runtime before starting a GPU-claiming container.
    # Model pull (multi-GiB) is the long pole — 20min budget. Also waits on
    # deploy-qos so tc rules are in place before the multi-GB pulls kick off
    # (uncapped pulls saturate the household ISP link).
    name: deploy (ollama)
    needs: [deploy-docker, deploy-ufw, deploy-nvidia-container, deploy-qos, changes]
    if: >-
      !failure() && !cancelled()
      && ((github.event_name == 'push' && github.ref == 'refs/heads/main')
          || github.event_name == 'schedule')
      && needs.changes.outputs.ollama == 'true'
    runs-on: [self-hosted, linux, homelab]
    # 45min budget: 60 Mbps QoS cap means a fresh ~13 GiB multi-model pull
    # takes ~29min on the wire alone; add compose up + steady-state converge
    # headroom. Steady-state (all models cached) runs in well under 5min.
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ github.sha }}
      - uses: ./.github/actions/deploy-tags
        with:
          tags: ollama

  deploy-homepage:
    name: deploy (homepage)
    needs: [deploy-docker, deploy-ufw, changes]
    if: >-
      !failure() && !cancelled()
      && ((github.event_name == 'push' && github.ref == 'refs/heads/main')
          || github.event_name == 'schedule')
      && needs.changes.outputs.homepage == 'true'
    runs-on: [self-hosted, linux, homelab]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ github.sha }}
      - uses: ./.github/actions/deploy-tags
        with:
          tags: homepage

  deploy-backup:
    name: deploy (backup)
    # Runs after any surviving app job. `!failure() && !cancelled()` lets
    # backup proceed even when some apps were skipped by the change gate —
    # `needs:` default would cascade-skip it otherwise. Gated on
    # changes.backup; weekly schedule force-fulls to heal drift.
    needs: [deploy-qos, deploy-observability, deploy-traefik, deploy-vaultwarden, deploy-jellyfin, deploy-tdarr, deploy-syncthing, deploy-gluetun, deploy-qbittorrent, deploy-prowlarr, deploy-flaresolverr, deploy-sonarr, deploy-radarr, deploy-bazarr, deploy-n8n, deploy-ollama, deploy-nvidia-container, deploy-homepage, changes]
    if: >-
      !failure() && !cancelled()
      && ((github.event_name == 'push' && github.ref == 'refs/heads/main')
          || github.event_name == 'schedule')
      && needs.changes.outputs.backup == 'true'
    runs-on: [self-hosted, linux, homelab]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ github.sha }}
      - uses: ./.github/actions/deploy-tags
        with:
          tags: backup

  deploy-finalize:
    name: deploy (smoke + ntfy notify)
    # Same skipped-upstream logic as deploy-backup.
    needs: [deploy-backup]
    if: >-
      !failure() && !cancelled()
      && ((github.event_name == 'push' && github.ref == 'refs/heads/main')
          || github.event_name == 'schedule')
    runs-on: [self-hosted, linux, homelab]
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ github.sha }}

      - name: Refuse to run if not main
        run: |
          if [ "${{ github.ref }}" != "refs/heads/main" ]; then
            echo "::error::deploy must only run on main; got ${{ github.ref }}"
            exit 1
          fi

      - name: Post-deploy smoke checks (local)
        run: ./scripts/smoke-deploy.sh

      - name: Notify ntfy on successful deploy
        # Publishes via `docker exec` into the ntfy container on its loopback,
        # NOT via traefik (runner's SNAT through 172.18.0.1 fails traefik's
        # wg-only ipAllowList). Soft-fail — ntfy outage covered by the
        # PushChannelUnreachable alert, deploy itself already succeeded.
        if: success()
        run: |
          set -euo pipefail
          ntfy_container=$(docker ps \
            --filter "label=com.docker.compose.project=observability" \
            --filter "label=com.docker.compose.service=ntfy" \
            --format '{{.Names}}' | head -1)
          if [ -z "${ntfy_container:-}" ]; then
            echo "::warning::ntfy container not running — skipping deploy notification"
            exit 0
          fi
          sha_short=$(git rev-parse --short HEAD)
          subject=$(git log -1 --format=%s)
          body="${sha_short} by ${{ github.actor }} — ${subject}"
          docker exec -i "$ntfy_container" wget -q -O- \
            --timeout=10 \
            --header="Title: Homelab deploy ✓" \
            --header="Priority: 3" \
            --header="Tags: rocket,white_check_mark" \
            --header="Click: ${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}" \
            --post-data="$body" \
            "http://localhost:80/homelab-deploy" >/dev/null \
            || echo "::warning::ntfy notify failed (deploy succeeded — check observability-ntfy)"

  deploy-manual:
    name: ansible-playbook (manual workflow_dispatch — single sequential job)
    needs: [lint, docker-test]
    # Manual dispatch only. The push-to-main path uses the DAG above.
    if: github.event_name == 'workflow_dispatch'
    runs-on: [self-hosted, linux, homelab]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ github.sha }}

      - name: Refuse to run if not main
        run: |
          if [ "${{ github.ref }}" != "refs/heads/main" ]; then
            echo "::error::deploy must only run on main; got ${{ github.ref }}"
            exit 1
          fi

      - name: Install Ansible collections
        working-directory: ansible
        env:
          ANSIBLE_COLLECTIONS_PATH: /opt/gha-cache/ansible-collections
        run: |
          mkdir -p /opt/gha-cache/ansible-collections
          flock /opt/gha-cache/ansible-collections/.lock \
            ansible-galaxy install -r requirements.yml

      - name: Override inventory for local run
        run: |
          cat > ansible/inventory.ci.yml <<'EOF'
          ---
          all:
            children:
              homelab_servers:
                hosts:
                  homelab:
                    ansible_connection: local
          EOF

      - name: ansible-playbook
        working-directory: ansible
        env:
          ANSIBLE_COLLECTIONS_PATH: /opt/gha-cache/ansible-collections
          ANSIBLE_CACHE_PLUGIN_CONNECTION: /opt/gha-cache/ansible-facts
        run: |
          ARGS=()
          if [ -n "${{ inputs.tags }}" ]; then
            ARGS+=(--tags "${{ inputs.tags }}")
          fi
          if [ "${{ inputs.check }}" = "true" ]; then
            ARGS+=(--check --diff)
          fi
          ansible-playbook \
            --force-handlers \
            -i inventory.ci.yml \
            playbooks/site.yml \
            "${ARGS[@]}"

      - name: Post-deploy smoke checks (local)
        if: inputs.check != 'true'
        run: ./scripts/smoke-deploy.sh
