---
- name: Ensure /opt/bazarr layout
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: "{{ bazarr_puid }}"
    group: "{{ bazarr_pgid }}"
    mode: "0755"
  loop:
    - /opt/bazarr
    - /opt/bazarr/config

- name: Template .env
  ansible.builtin.template:
    src: env.j2
    dest: /opt/bazarr/.env
    owner: root
    group: root
    mode: "0600"
  no_log: true
  notify: Swap bazarr service

- name: Deploy docker-compose.yml
  ansible.builtin.copy:
    src: docker-compose.yml
    dest: /opt/bazarr/docker-compose.yml
    owner: root
    group: root
    mode: "0644"
  notify: Swap bazarr service

- name: Bring up Bazarr stack
  community.docker.docker_compose_v2:
    project_src: /opt/bazarr
    state: present
    pull: policy
    recreate: never
