---
- name: Ensure wireguard tooling is installed
  ansible.builtin.apt:
    name:
      - wireguard
      - wireguard-tools
    state: present

- name: Ensure bootstrap-generated private key exists
  # The key is generated ONCE on the homelab console by bootstrap.sh. Ansible
  # reads it but never regenerates — rotation is an explicit scripts/rotate-wg-key.sh.
  ansible.builtin.stat:
    path: /etc/wireguard/privatekey
  register: wireguard_privkey_stat

- name: Refuse to proceed without a WG private key
  ansible.builtin.assert:
    that:
      - wireguard_privkey_stat.stat.exists
      - wireguard_privkey_stat.stat.size | int > 0
    fail_msg: >
      /etc/wireguard/privatekey is missing or empty. Run bootstrap.sh on the
      homelab console first — it generates the keypair.

- name: Read WG private key
  ansible.builtin.slurp:
    src: /etc/wireguard/privatekey
  register: wireguard_privkey_content
  no_log: true

- name: Check for WG preshared key
  ansible.builtin.stat:
    path: /etc/wireguard/hub_psk
  register: wireguard_psk_stat

- name: Read WG preshared key (optional — used if present)
  ansible.builtin.slurp:
    src: /etc/wireguard/hub_psk
  register: wireguard_psk_content
  when: wireguard_psk_stat.stat.exists
  no_log: true

- name: Ensure /etc/wireguard directory mode
  ansible.builtin.file:
    path: /etc/wireguard
    state: directory
    owner: root
    group: root
    mode: "0700"

- name: Template wg0.conf
  ansible.builtin.template:
    src: wg0.conf.j2
    dest: /etc/wireguard/wg0.conf
    owner: root
    group: root
    mode: "0600"
  no_log: true
  notify: Reload wg0

- name: Enable wg-quick@wg0
  ansible.builtin.systemd:
    name: wg-quick@wg0
    enabled: true
    state: started
