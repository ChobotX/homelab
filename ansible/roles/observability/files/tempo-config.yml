---
# Tempo single-binary mode, local storage, OTLP receivers only.
server:
  http_listen_port: 3200
  grpc_listen_port: 9095
  log_level: warn

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

ingester:
  max_block_duration: 5m

compactor:
  compaction:
    block_retention: 168h  # 7d

metrics_generator:
  registry:
    external_labels:
      source: tempo
  storage:
    path: /var/tempo/generator/wal
    remote_write:
      - url: http://prometheus:9090/api/v1/write
        send_exemplars: true
  traces_storage:
    path: /var/tempo/generator/traces

storage:
  trace:
    backend: local
    wal:
      path: /var/tempo/wal
    local:
      path: /var/tempo/blocks
    # Compactor deletes blocks between tenant-index builds; the builder's
    # next scan ENOENTs on the just-deleted UUID and logs "failed to poll
    # tenant blocks". Tolerate a few of those before escalating to error,
    # and jitter the poll so concurrent builders don't race identically.
    # Tempo single-binary, local backend — compactor + ingester in-process.
    blocklist_poll_tolerate_consecutive_errors: 5
    blocklist_poll_jitter_ms: 500

overrides:
  defaults:
    metrics_generator:
      processors: [service-graphs, span-metrics]

usage_report:
  reporting_enabled: false
