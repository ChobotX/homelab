---
name: deploy

on:
  push:
    branches: [main]
    paths:
      - "ansible/**"
      - "bootstrap.sh"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:
    inputs:
      tags:
        description: "Ansible --tags filter (blank = full run)"
        required: false
        default: ""
      check:
        description: "Run as --check only (no changes)"
        type: boolean
        default: false

permissions:
  contents: read

# Serialize: never two deploys against the same homelab at once.
concurrency:
  group: deploy-homelab
  cancel-in-progress: false

jobs:
  deploy:
    name: ansible-playbook (self-hosted runner on homelab)
    runs-on: [self-hosted, linux, homelab]
    timeout-minutes: 30
    steps:
      - name: Refuse to run if not main
        # Defence-in-depth: never apply from a non-main ref even if someone
        # adds a wider trigger later.
        run: |
          if [ "${{ github.ref }}" != "refs/heads/main" ]; then
            echo "::error::deploy must only run on main; got ${{ github.ref }}"
            exit 1
          fi

      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          # persist-credentials: false is dropped intentionally. It triggers
          # the action's pre-fetch auth cleanup (`git config --local …`) in
          # a dir with no .git on a fresh ephemeral self-hosted workspace,
          # failing with exit 128. The JIT wrapper wipes _work after every
          # job so nothing leaks across jobs.
          ref: ${{ github.sha }}

      # ansible-core is installed by bootstrap.sh (apt) and kept drift-proof
      # by the common role. The runner just uses it — no per-deploy install.

      - name: Install Ansible collections
        working-directory: ansible
        run: ansible-galaxy install --force -r requirements.yml

      - name: Override inventory for local run
        run: |
          mkdir -p ansible/inventory.d
          cat > ansible/inventory.d/ci.yml <<'EOF'
          ---
          all:
            children:
              homelab_servers:
                hosts:
                  homelab:
                    ansible_connection: local
          EOF

      - name: ansible-playbook
        working-directory: ansible
        run: |
          ARGS=()
          if [ -n "${{ inputs.tags }}" ]; then
            ARGS+=(--tags "${{ inputs.tags }}")
          fi
          if [ "${{ inputs.check }}" = "true" ]; then
            ARGS+=(--check --diff)
          fi
          ansible-playbook \
            -i inventory.d/ci.yml \
            playbooks/site.yml \
            "${ARGS[@]}"

      - name: Post-deploy smoke checks (local)
        run: ./scripts/smoke-deploy.sh
