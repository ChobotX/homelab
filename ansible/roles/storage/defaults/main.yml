---
# /mnt/elements is a 1.9T btrfs disk on /dev/sdb1. Formatted out-of-band on
# host console (wipefs + mkfs.btrfs) — same posture as WG keys: ansible
# consumes a pre-existing artefact, never creates/destroys storage.
storage_mount_point: /mnt/elements
storage_mount_uuid: 7974fe93-4040-4c77-9265-04250f969cf6
storage_mount_fstype: btrfs
# zstd:3 is the btrfs sweet spot — strong ratio for logs/TSDB, CPU cost is
# invisible next to the disk write. nofail + device-timeout=15 keep boot
# usable even if the disk is physically detached.
storage_mount_opts: "defaults,noatime,compress=zstd:3,nofail,x-systemd.device-timeout=15"

# Daily read-only btrfs snapshot timer for /mnt/elements. CoW makes each
# snapshot near-free until churn happens; storage cost grows with delta,
# not snapshot count. Snapshots live in a sibling subvolume
# /mnt/elements/.snapshots so they don't recursively include themselves.
# 7-day retention is plenty for "oops I deleted the wrong thing" rollback;
# longer-term recovery is restic's job.
storage_btrfs_snapshot_enabled: true
storage_btrfs_snapshot_oncalendar: "*-*-* 02:00:00"
storage_btrfs_snapshot_retention_days: 7

# Each entry becomes a bind mount: /mnt/elements/<dst> → <src>.
# The src path is created as an empty mount point (so it exists even on a
# fresh host before the consumer role runs). The dst path under
# /mnt/elements is where the real data lives.
#
# Ownership on the dst is applied to the *btrfs subdir*, not through the bind
# — consumer roles (observability, traefik) already chown their own leaf
# dirs, so we only set a safe top-level 0755 root-owned default here.
storage_binds:
  - src: /opt/observability/data
    dst: observability-data
  - src: /opt/traefik/logs
    dst: traefik-logs
  # Media stack — jellyfin + syncthing. Config/cache/metadata land on the HDD
  # along with the library itself so the SSD stays reserved for OS + docker
  # overlays. Transcode scratch goes to in-container tmpfs (RAM), not here.
  - src: /opt/jellyfin/config
    dst: jellyfin-config
  - src: /opt/jellyfin/cache
    dst: jellyfin-cache
  - src: /opt/jellyfin/metadata
    dst: jellyfin-metadata
  - src: /opt/syncthing/config
    dst: syncthing-config
  # Shared media library. Syncthing writes into incoming/ (rw), jellyfin
  # mounts the whole tree read-only. Sonarr/Radarr write finals into
  # movies/ + tv/ after import. Layout already compatible with arr stack.
  - src: /opt/media
    dst: media
  # qBittorrent download target. Kept on the SAME btrfs filesystem as
  # /opt/media so Sonarr/Radarr can hardlink from torrents/→media/ on
  # import — no copy, no wasted space, seed continues from original inode.
  - src: /opt/torrents
    dst: torrents
  # n8n SQLite + execution history grow with workflow activity — HDD not SSD.
  - src: /opt/n8n/data
    dst: n8n-data
  # Ollama weights are multi-GiB per model and re-downloadable, but the HDD
  # still carries them to keep the SSD free for OS + docker overlays.
  - src: /opt/ollama/models
    dst: ollama-models
  # Tdarr — server state (queue DB, history, plugin checkout) + per-run logs.
  # Transcode scratch goes to in-container tmpfs (RAM), not here. Server state
  # is small but expensive to lose (queue progress, file fingerprints), logs
  # are large + churn-heavy → both belong off the SSD.
  - src: /opt/tdarr/server
    dst: tdarr-server
  - src: /opt/tdarr/configs
    dst: tdarr-configs
  - src: /opt/tdarr/logs
    dst: tdarr-logs
  # Tdarr transcode scratch — was tmpfs, but 16 GiB cap couldn't hold 1080p
  # remux output (HEVC video + DTS-HD MA passthrough ~16.5 GiB, hits ENOSPC).
  # 4K outputs need 30-60 GiB. Disk cache trades RAM speed for unlimited size
  # and removes OOM risk. btrfs CoW + zstd handles the write churn fine.
  - src: /opt/tdarr/cache
    dst: tdarr-cache
