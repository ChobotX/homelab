---
homepage_image: "ghcr.io/gethomepage/homepage:v1.12.3@sha256:cc84f2f5eb3c7734353701ccbaa24ed02dacb0d119114e50e4251e2005f3990a"
homepage_host: "home.{{ homelab_domain }}"
homepage_title: "Homelab"
homepage_header_style: clean

# Per-service links for the signpost page. Live widgets reuse existing internal
# service endpoints (observability network DNS). siteMonitor fields add a
# green/red status dot + response time per tile — Homepage's built-in
# per-service health indicator; no extra probes required.
#
# Extra per-instance top-level groups live in homepage_services_extra in
# /etc/homelab/config.yml — keeps real URLs out of git. Lists are concatenated
# at template time.
homepage_services:
  - group: Homelab
    items:
      - name: Grafana
        href: "https://grafana.{{ homelab_domain }}"
        icon: grafana.svg
        description: Dashboards, logs, traces
        siteMonitor: "http://grafana:3000/api/health"
        widget:
          type: grafana
          url: "http://grafana:3000"
          username: admin
          # Literal `{{HOMEPAGE_VAR_GRAFANA_PASSWORD}}` — Homepage substitutes
          # at runtime from the HOMEPAGE_VAR_GRAFANA_PASSWORD env var (set in
          # .env from grafana_admin_password). `!unsafe` keeps Ansible's Jinja
          # pass from trying to resolve it. Homepage expects the braces to be
          # tight (no inner spaces) so we keep it that way even though
          # ansible-lint's jinja[spacing] would prefer spaces here.
          password: !unsafe "{{HOMEPAGE_VAR_GRAFANA_PASSWORD}}"  # noqa: jinja[spacing]
  - group: Services
    items:
      - name: Vaultwarden
        href: "https://{{ vaultwarden_host }}"
        icon: vaultwarden.svg
        description: Password vault
        siteMonitor: "http://vaultwarden:80/alive"
  - group: Media
    items:
      - name: Jellyfin
        href: "https://{{ jellyfin_host }}"
        icon: jellyfin.svg
        description: Media streaming
        # Health endpoint is unauth'd; dot goes green when the container is up
        # and Traefik is routing. Live widget needs an API key from Jellyfin's
        # first-run wizard — deferred (plumb via HOMEPAGE_VAR_JELLYFIN_KEY once
        # registered).
        siteMonitor: "http://jellyfin:8096/health"
      - name: Syncthing
        href: "https://{{ syncthing_host }}"
        icon: syncthing.svg
        description: Media upload & sync
        siteMonitor: "http://syncthing:8384/rest/noauth/health"
      - name: Sonarr
        href: "https://{{ sonarr_host }}"
        icon: sonarr.svg
        description: TV library manager
      - name: Radarr
        href: "https://{{ radarr_host }}"
        icon: radarr.svg
        description: Movie library manager
      - name: Prowlarr
        href: "https://{{ prowlarr_host }}"
        icon: prowlarr.svg
        description: Indexer manager (via Mullvad)
      - name: Bazarr
        href: "https://{{ bazarr_host }}"
        icon: bazarr.svg
        description: Subtitles for Sonarr + Radarr
      - name: qBittorrent
        href: "https://{{ qbittorrent_host }}"
        icon: qbittorrent.svg
        description: Download client (via Mullvad)
      - name: Tdarr
        href: "https://{{ tdarr_host }}"
        icon: tdarr.svg
        description: Library transcode farm (NVENC HEVC)
        siteMonitor: "http://tdarr:8265/api/v2/status"
  - group: Automation
    items:
      - name: n8n
        href: "https://{{ n8n_host }}"
        icon: n8n.svg
        description: Workflow automation / webhooks
        siteMonitor: "http://n8n:5678/healthz"
# Per-instance additions (external PaaS, uptime pages, WG hub). Set in
# /etc/homelab/config.yml; defaults to empty so no real URLs ship in git.
homepage_services_extra: []

# Groups appended AFTER _extra — lets the template push standalone nodes
# (different physical hardware) past an extras row that creates a visual
# break in the CSS grid flow. Raspberry Pi sits here so Hetzner's 3-tile
# row wraps and RPi starts on a fresh row.
homepage_services_tail:
  - group: Raspberry Pi
    items:
      - name: Home Assistant
        href: "https://{{ traefik_homeassistant_host }}"
        icon: home-assistant.svg
        description: Smart-home hub (HAOS)
        siteMonitor: "http://{{ homeassistant_host | default('') }}"
        # Reuses homeassistant_metrics_token (already a long-lived access
        # token used for Prometheus scraping — HA LLATs are user-scoped,
        # not endpoint-scoped, so the same token fits the widget API).
        widget:
          type: homeassistant
          url: "http://{{ homeassistant_host | default('') }}"
          key: !unsafe "{{HOMEPAGE_VAR_HA_TOKEN}}"  # noqa: jinja[spacing]
          fields: "[\"people_home\", \"lights_on\", \"switches_on\"]"

# Extra top-of-page info widgets.
homepage_widgets_extra: []

# Optional bookmark groups. Override in /etc/homelab/config.yml.
homepage_bookmarks: []
